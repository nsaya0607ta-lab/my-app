<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Azure 問題集</title>
<meta name="theme-color" content="#0a1626">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AZ-900">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a1626'/%3E%3Ctext x='90' y='118' font-size='78' font-family='Arial' font-weight='bold' fill='%2338a3ff' text-anchor='middle'%3EAZ%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0a1626; --bg2:#0f2238; --surface:#13304d; --surface2:#1a3d61;
  --line:#234b73; --accent:#38a3ff; --good:#36d399; --gold:#f5c451; --bad:#f87272;
  --text:#eaf2fb; --muted:#88a4c0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
  background:radial-gradient(120% 90% at 50% -10%, #16395c 0%, var(--bg) 55%) fixed;
  color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
}
.shell{max-width:480px;margin:0 auto;padding:max(22px,env(safe-area-inset-top)) 18px calc(30px + env(safe-area-inset-bottom));display:flex;flex-direction:column;min-height:100vh;}
.top{margin-bottom:18px;}
.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--accent);font-weight:700;}
h1.title{font-size:34px;line-height:1.05;font-weight:800;margin:8px 0 0;letter-spacing:-.01em;}
.page{flex:1;animation:fade .35s ease;}
.statusbar{display:none;align-self:stretch;width:100%;box-sizing:border-box;align-items:center;gap:12px;
  position:sticky;top:6px;z-index:50;margin:0 0 16px;padding:9px 14px;
  background:rgba(13,28,48,.6);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.3);}
.statusbar.show{display:flex;}
.sb-levels{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;}
.sb-line{display:flex;align-items:center;gap:10px;}
.sb-lab{flex:none;width:104px;font-size:11px;color:var(--muted);white-space:nowrap;letter-spacing:.01em;line-height:1;overflow:hidden;text-overflow:ellipsis;}
.sb-lab b{color:var(--text);font-size:13px;font-weight:800;margin-left:2px;}
.sb-lab-cert b{color:var(--accent);}
.sb-prog{flex:1;min-width:40px;height:6px;border-radius:99px;background:var(--bg2);overflow:visible;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), inset 0 1px 2px rgba(0,0,0,.5), 0 0 5px rgba(56,163,255,.10);}
.sb-prog-f{display:block;height:100%;border-radius:99px;width:0;transition:width .7s cubic-bezier(.22,1,.36,1);}
.sb-prog-f.overall{background:linear-gradient(90deg,#f0a91e,#ffcb47 55%,#ffe9a8);background-size:200% 100%;animation:sbflow 2.6s linear infinite;
  box-shadow:0 0 6px 1px rgba(245,196,81,.6), 0 0 12px 2px rgba(245,196,81,.32), inset -4px 0 5px -3px rgba(255,255,255,.7);}
.sb-prog-f.cert{background:linear-gradient(90deg,#2a86ec,#48a6ff 55%,#a9ddff);background-size:200% 100%;animation:sbflow 3.2s linear infinite;
  box-shadow:0 0 6px 1px rgba(56,163,255,.6), 0 0 12px 2px rgba(56,163,255,.32), inset -4px 0 5px -3px rgba(255,255,255,.7);}
@keyframes sbflow{0%{background-position:0 0}100%{background-position:200% 0}}
.sb-div{align-self:stretch;width:1px;background:var(--line);flex:none;}
.sb-coin{flex:none;font-size:11px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:4px;}
.sb-coin b{color:var(--gold);font-size:16px;font-weight:800;}
@media (max-width:360px){
  .sb-lab{width:92px;font-size:10px;}
  .sb-lab b{font-size:12px;}
  .sb-coin b{font-size:14px;}
}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.foot{margin-top:18px;font-size:11px;color:var(--muted);text-align:center;letter-spacing:.02em;}
.empty,.loading{color:var(--muted);text-align:center;padding:50px 0;line-height:1.7;}

.stats{display:flex;gap:12px;margin-bottom:26px;}
.stat{flex:1;background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:16px 14px;}
.stat-num{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;}
.stat-best{color:var(--gold);}
.stat-lab{font-size:12px;color:var(--muted);margin-top:2px;}

.section-lab{font-size:12px;letter-spacing:.14em;color:var(--muted);font-weight:700;margin-bottom:12px;}
.modes{display:flex;flex-direction:column;gap:11px;}
.mode{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:16px;color:var(--text);transition:transform .12s,border-color .12s,background .12s;}
.mode:active{transform:scale(.985);background:var(--surface2);}
.mode-dot{width:10px;height:10px;border-radius:50%;flex:none;}
.mode-text{display:flex;flex-direction:column;flex:1;}
.mode-label{font-weight:700;font-size:16px;}
.mode-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.mode-arrow{color:var(--muted);font-size:18px;}
.link{margin-top:20px;width:100%;background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;padding:8px;}

.q-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.quit{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;padding:8px 15px;border-radius:99px;transition:background .12s;}
.quit:active{background:var(--surface2);}
.q-count{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;}
.q-count em{color:var(--muted);font-weight:500;font-size:13px;font-style:normal;}
.progress{height:5px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-bottom:22px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7ac6ff);border-radius:99px;transition:width .4s;}
.q-text{font-size:18px;line-height:1.6;font-weight:600;margin:0 0 22px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:14px;color:var(--text);font-size:15px;line-height:1.4;transition:all .12s;}
.opt-key{width:26px;height:26px;flex:none;border-radius:7px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);}
.opt-label{flex:1;}
.opt-mark{font-weight:800;font-size:16px;}
.opt.picked{border-color:var(--accent);background:var(--surface2);}
.opt.picked .opt-key{background:var(--accent);color:#06243f;}
.opt.correct{border-color:var(--good);background:rgba(54,211,153,.12);}
.opt.correct .opt-key{background:var(--good);color:#063527;}
.opt.correct .opt-mark{color:var(--good);}
.opt.wrong{border-color:var(--bad);background:rgba(248,114,114,.1);}
.opt.wrong .opt-key{background:var(--bad);color:#3a0d0d;}
.opt.wrong .opt-mark{color:var(--bad);}
.opt.dim{opacity:.5;}
.opt:disabled{cursor:default;}

.expl{display:flex;flex-direction:column;gap:4px;margin-top:16px;padding:14px;border-radius:12px;font-size:14px;line-height:1.6;border:1px solid var(--line);background:var(--bg2);}
.expl strong{font-size:13px;letter-spacing:.05em;}
.expl.ok strong{color:var(--good);}
.expl.ng strong{color:var(--bad);}

.cta{width:100%;margin-top:20px;padding:16px;border:none;border-radius:13px;cursor:pointer;font-size:16px;font-weight:700;color:#062340;background:linear-gradient(90deg,var(--accent),#62b8ff);transition:transform .1s,opacity .15s;}
.cta:active{transform:scale(.99);}
.cta:disabled{opacity:.4;cursor:default;}
.ghost{width:100%;margin-top:10px;padding:14px;border:1px solid var(--line);border-radius:13px;background:none;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;}
.danger{color:var(--bad);border-color:rgba(248,114,114,.4);margin-top:24px;}

.gauge-wrap{position:relative;width:200px;height:200px;margin:8px auto 4px;}
.gauge{width:100%;height:100%;}
.gauge-bg{fill:none;stroke:var(--bg2);stroke-width:14;}
.gauge-fg{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1);}
.gauge-fg.pass{stroke:var(--good);}
.gauge-fg.fail{stroke:var(--gold);}
.gauge-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gauge-score{font-size:52px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.gauge-max{font-size:14px;color:var(--muted);margin-top:4px;}
.verdict{text-align:center;font-weight:700;font-size:17px;margin-top:10px;}
.verdict.pass{color:var(--good);}
.verdict.fail{color:var(--gold);}
.result-meta{text-align:center;color:var(--muted);font-size:14px;margin-top:6px;}
.breakdown{margin-top:24px;display:flex;flex-direction:column;gap:11px;}
.bd-row{display:flex;align-items:center;gap:12px;}
.bd-lab{width:48px;font-size:13px;color:var(--muted);}
.bd-bar{flex:1;height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;}
.bd-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7ac6ff);border-radius:99px;}
.bd-num{width:40px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums;}
.actions{margin-top:28px;}

.chart{position:relative;display:flex;align-items:flex-end;gap:8px;height:160px;margin:8px 0 24px;padding:10px 4px 0;border-bottom:1px solid var(--line);}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:5px;}
.chart-bar-track{flex:1;width:100%;display:flex;align-items:flex-end;}
.chart-bar{width:100%;border-radius:5px 5px 0 0;min-height:3px;}
.chart-bar.pass{background:linear-gradient(180deg,var(--good),#1f9c6e);}
.chart-bar.fail{background:linear-gradient(180deg,var(--gold),#c79321);}
.chart-val{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;}
.chart-passline{position:absolute;left:0;right:0;border-top:1px dashed rgba(245,196,81,.5);}
.chart-passline span{position:absolute;right:0;top:-16px;font-size:10px;color:var(--gold);}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.hist-left{display:flex;flex-direction:column;gap:2px;}
.hist-mode{font-weight:700;font-size:14px;}
.hist-date{font-size:12px;color:var(--muted);}
.hist-right{display:flex;align-items:baseline;gap:10px;}
.hist-score{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.hist-score.pass{color:var(--good);}
.hist-score.fail{color:var(--gold);}
.hist-correct{font-size:12px;color:var(--muted);}
.install{margin-top:14px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7;border:1px dashed var(--line);border-radius:12px;padding:12px;}
.q-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:14px;}
.q-badge .stars{color:var(--gold);letter-spacing:1px;}
.q-badge .pts{background:var(--bg2);border:1px solid var(--line);border-radius:99px;padding:2px 9px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
.start-hero{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:22px 20px;text-align:center;margin-bottom:14px;}
.start-hero .big{font-size:15px;color:var(--muted);}
.start-hero .pool{font-size:40px;font-weight:800;margin:6px 0 2px;font-variant-numeric:tabular-nums;}
.start-hero .pool em{font-size:18px;color:var(--muted);font-style:normal;font-weight:600;}
.start-hero .note{font-size:12px;color:var(--muted);margin-top:4px;}
.result-sub{text-align:center;color:var(--muted);font-size:13px;margin-top:4px;}
.q-badge .multi{background:rgba(56,163,255,.15);border:1px solid var(--accent);color:var(--accent);border-radius:99px;padding:2px 9px;font-weight:700;}
.opt-key.box{border-radius:6px;}
.opt.picked .opt-key.box::after{content:"";}
.expl.partial{border-color:rgba(245,196,81,.5);}
.expl.partial strong{color:var(--gold);}
.expl .earn{color:var(--muted);font-size:12px;margin-top:2px;}
.review-q{margin-bottom:8px;padding:16px 0 18px;border-bottom:1px solid var(--line);}
.review-q .q-text{font-size:15px;font-weight:600;margin:0 0 12px;}
.review-q .opts{gap:8px;}
.review-q .opt{cursor:default;font-size:14px;padding:11px 13px;}
.review-q .expl{margin-top:12px;}
.review-num{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px;}
.rv-tag{flex:none;border-radius:99px;padding:2px 10px;font-size:11px;}
.rv-tag.ok{background:rgba(54,211,153,.15);color:var(--good);}
.rv-tag.partial{background:rgba(245,196,81,.15);color:var(--gold);}
.rv-tag.ng{background:rgba(248,114,114,.15);color:var(--bad);}
.xhero{background:linear-gradient(160deg,#1c2b52,#11203a);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px;}
.xhero .lab{font-size:11px;letter-spacing:.14em;color:var(--accent);font-weight:700;}
.xhero .term{font-size:26px;font-weight:800;margin:6px 0 2px;}
.xhero .note{font-size:12px;color:var(--muted);}
.x-sub{font-size:12px;letter-spacing:.12em;color:var(--muted);font-weight:700;margin:18px 0 10px;}
.x-grid{display:flex;flex-wrap:wrap;gap:8px;}
.x-pill{background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;}
.x-pill:active{background:var(--surface2);}
.x-term-head{font-size:22px;font-weight:800;margin:6px 0 14px;}
.x-area{width:100%;min-height:140px;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px;color:var(--text);font-size:16px;line-height:1.6;font-family:inherit;resize:vertical;}
.x-area:focus{outline:none;border-color:var(--accent);}
.x-tools{display:flex;gap:10px;margin-top:10px;}
.mic{flex:none;display:flex;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:0 16px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;}
.mic.rec{border-color:var(--bad);color:var(--bad);background:rgba(248,114,114,.1);}
.x-hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;}
.score-big{text-align:center;font-size:60px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;margin:6px 0;}
.score-big small{font-size:20px;color:var(--muted);font-weight:600;}
.score-cap{text-align:center;font-size:13px;color:var(--muted);margin-bottom:18px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 4px;}
.chip{border-radius:99px;padding:5px 12px;font-size:13px;font-weight:600;}
.chip.hit{background:rgba(54,211,153,.15);color:var(--good);}
.chip.partial{background:rgba(245,196,81,.15);color:var(--gold);}
.chip.miss{background:var(--bg2);color:var(--muted);border:1px dashed var(--line);}
.x-model{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:14px;margin-top:14px;font-size:14px;line-height:1.7;}
.x-model strong{display:block;font-size:12px;color:var(--accent);margin-bottom:5px;letter-spacing:.05em;}
.axis{display:flex;align-items:center;gap:10px;margin:9px 0;}
.axis-l{width:84px;font-size:13px;color:var(--muted);}
.axis-bar{flex:1;height:9px;background:var(--bg2);border-radius:99px;overflow:hidden;}
.axis-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#7ac6ff);}
.axis-n{width:38px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums;}
.x-ai-card{background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px;}
.x-ai-card .ttl{font-size:12px;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-bottom:10px;}
.x-fb{font-size:14px;line-height:1.7;margin-top:6px;}
.x-fb .warn{color:var(--gold);}
.x-aibar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-top:16px;border-top:1px solid var(--line);padding-top:12px;}
.x-aibar button{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;}
.x-loading{text-align:center;color:var(--muted);font-size:13px;padding:14px;}
.dict-search{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--text);font-size:15px;font-family:inherit;margin-bottom:10px;}
.dict-search:focus{outline:none;border-color:var(--accent);}
.dict-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;color:var(--muted);}
.dict-sortbtn{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:0;}
.dict-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;}
.dict-term{font-size:16px;font-weight:800;margin-bottom:6px;}
.dict-def{font-size:14px;line-height:1.75;color:var(--text);}
.dict-points{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
.dict-pt{font-size:11px;background:var(--bg2);border:1px solid var(--line);border-radius:99px;padding:3px 10px;color:var(--muted);}
.bp-card{margin-top:18px;background:linear-gradient(160deg,#1c3a2e,#11253a);border:1px solid var(--line);border-radius:16px;padding:16px;}
.coin-card{margin-top:12px;background:linear-gradient(160deg,#3a2f10,#2a2208);border:1px solid rgba(245,196,81,.4);border-radius:16px;padding:14px 16px;}
.coin-row{display:flex;align-items:center;gap:8px;}
.coin-ic{font-size:20px;}
.coin-gain{font-size:18px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;}
.coin-total{font-size:12px;color:var(--muted);margin-top:4px;}
.bp-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;}
.bp-gain{color:var(--good);font-size:18px;font-variant-numeric:tabular-nums;}
.bp-total{font-size:12px;color:var(--muted);margin-top:3px;}
.bp-exp-line{font-size:13px;color:var(--text);margin-top:6px;font-weight:600;}
.cta-exam{background:linear-gradient(90deg,var(--gold),#ffd97a);color:#3a2c06;}
.mode-note{font-size:11px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.5;}
.mode-tag{border-radius:99px;padding:1px 8px;font-size:11px;font-weight:700;}
.mode-tag.practice{background:rgba(56,163,255,.15);color:var(--accent);}
.mode-tag.exam{background:rgba(245,196,81,.15);color:var(--gold);}
.pcount-wrap{background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:14px;text-align:center;}
.pcount-lab{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;}
.pcount{display:flex;gap:10px;}
.pcount-btn{flex:1;background:linear-gradient(180deg,#1d3550,#142840);border:1px solid var(--line);border-radius:12px;padding:16px 0;color:var(--text);font-size:16px;font-weight:800;cursor:pointer;}
.pcount-btn:active{transform:scale(.97);border-color:var(--accent);}
.hist-score small{color:var(--muted);font-weight:600;font-size:10px;}
.qstat{margin-top:10px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:8px;}
.qstat-v{font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
.qstat-n{color:var(--muted);font-weight:600;margin-left:4px;}
.danger-zone{margin-top:22px;border:1px solid rgba(255,107,107,.35);border-radius:14px;padding:14px;background:rgba(255,107,107,.05);}

<script>
const L = ["A","B","C","D","E"];
let PASS = 700;   // 選択中の資格の合格ライン（loadCertで設定）
let DRAW = 45;    // 選択中の資格の1回の出題数（loadCertで設定）
let Q = [], CONCEPTS = [], TIERS = [];   // 選択中の資格のデータ（loadCertで差し替え）
const IMP_POINTS = {1:15, 2:18, 3:21, 4:24, 5:27}; // 重要度 → 配点
// ▼▼▼ 【新設】IPアドレス計算・変換用の共通ロジック ▼▼▼
function ipToNum(ipStr) {
  const parts = (ipStr || "").split('.').map(Number);
  if (parts.length !== 4 || parts.some(num => isNaN(num) || num < 0 || num > 255)) return null;
  return ((parts[0] << 24) >>> 0) + (parts[1] << 16) + (parts[2] << 8) + parts[3];
}
function numToIp(num) {
  return [num >>> 24, (num >>> 16) & 255, (num >>> 8) & 255, num & 255].join('.');
}
// ネットワークの開始・終了IPの数値を計算（プレフィックス長の上限を32に設定・制限）
function getIpRange(ipStr, prefix) {
  const ipNum = ipToNum(ipStr);
  if (ipNum === null) return null;
  
  const p = parseInt(prefix, 10);
  // ❌ プレフィックス長が 8 〜 32 の範囲外、または数字でない場合は無効（制限）
  if (isNaN(p) || p < 8 || p > 32) return null;
  
  // /32 の場合は開始IPと終了IPが全く同じになるため、ビットシフトをせず直接返す
  if (p === 32) {
    return { start: ipNum, end: ipNum };
  }
  
  const mask = p === 0 ? 0 : (~0 << (32 - p)) >>> 0;
  const start = (ipNum & mask) >>> 0;
  const end = (start | ~mask) >>> 0;
  
  return { start, end };
}
// ▲▲▲ 【追加ここまで】 ▲▲▲

/* =========================================================================
   問題プール（ここに追加していけば自動でランダム出題の対象になります）
   imp  = 重要度(1〜5)。配点は IMP_POINTS で決定。
   a    = 単一選択の正解インデックス
   c    = 複数選択の正解インデックス配列（指定があれば複数選択問題）

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmt(iso){ const d=new Date(iso),p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function pts(q){ return IMP_POINTS[q.imp] || 21; }
function stars(n){ return "★".repeat(n)+"☆".repeat(5-n); }
function isMulti(q){ return Array.isArray(q.c); }
function correctSet(q){ return isMulti(q) ? q.c : [q.a]; }

// 1問の採点：{earned, full}
function grade(q, sel){
  const W = pts(q);
  if(!isMulti(q)){ const ok = sel && sel[0]===q.a; return {earned: ok?W:0, full: ok}; }
  const cor = q.c, per = W/cor.length;
  let cs=0, ws=0;
  (sel||[]).forEach(i=>{ if(cor.indexOf(i)>=0) cs++; else ws++; });
  const earned = Math.max(0, (cs-ws)*per);
  const full = (cs===cor.length && ws===0);
  return {earned, full};
}

function start(mode, count){
  practicePick=false;
  S.review=false;
  S.mode = (mode==="practice") ? "practice" : "exam";
  const n = (S.mode==="practice") ? (count||10) : DRAW;   // 演習は選択数、試験は従来どおりDRAW
  S.deck = shuffle(Q).slice(0, Math.min(n, Q.length));
  S.idx=0; S.picks=[]; S.sel=[]; S.screen="quiz"; render();
}
function startReview(){
  practicePick=false;
  const wrong=loadWrong();
  const pool=Q.filter(q=>wrong.indexOf(q.id)>=0);
  if(!pool.length){ go("home"); return; }
  S.review=true;
  S.deck = shuffle(pool).slice(0, Math.min(DRAW, pool.length));
  S.idx=0; S.picks=[]; S.sel=[]; S.screen="quiz"; render();
}
function pick(i){
  const q=S.deck[S.idx];
  if(isMulti(q)){ const k=S.sel.indexOf(i); if(k>=0)S.sel.splice(k,1); else S.sel.push(i); }
  else { S.sel=[i]; }
  render();
}
function commit(){            // 試験モード：正誤は出さず次へ進む
  if(!S.sel.length) return;
  S.picks.push(S.sel.slice());
  if(S.idx+1 < S.deck.length){ S.idx++; S.sel=[]; render(); }
  else finish();
}

/* ===== 経験値(EXP)の計算：モード別 =====
   ・演習モード：獲得点数がそのままEXP
   ・試験モード：700点未満は0、以上はスコア帯ごとにボーナス倍率
   端数は四捨五入（Math.round）で処理 */
function examMult(score){
  if(score < 700) return 0;
  if(score < 800) return 1.25;
  if(score < 900) return 1.5;
  if(score < 950) return 1.75;
  return 2.0;
}
function calcExp(score, mode){
  if(mode === "practice") return score;           // 演習：点数 = EXP
  return Math.round(score * examMult(score));      // 試験：倍率適用後に四捨五入
}

/* ===== コイン(AC) ===== アカウント共通のウォレット（資格横断） */
function loadCoins(){ const v=parseInt(localStorage.getItem("coins")||"0",10); return isNaN(v)?0:v; }
function saveCoins(v){ try{ localStorage.setItem("coins", String(v||0)); }catch(e){} }
// 獲得コイン：試験はスコア帯で固定、演習・復習は「正解数×3」
function coinReward(runMode, correct, score){
  if(runMode === "exam"){
    if(score < 700) return 50;
    if(score < 800) return 150;
    if(score < 900) return 200;
    if(score < 950) return 250;
    return 300;
  }
  return correct * 3;   // 演習・復習
}

function finish(){
  let earned=0, total=0, correct=0;
  S.deck.forEach((q,i)=>{ total+=pts(q); const g=grade(q,S.picks[i]); earned+=g.earned; if(g.full)correct++; });
  // 復習リストの更新：間違えた問題を登録、正解できた問題は克服として除外
  const wrong=new Set(loadWrong());
  S.deck.forEach((q,i)=>{ if(grade(q,S.picks[i]).full) wrong.delete(q.id); else wrong.add(q.id); });
  const wrongList=[...wrong];
  saveWrong(wrongList);

  // モード判定（exam=試験 / practice=演習 / review=復習）
  const runMode = S.review ? "review" : (S.mode==="practice" ? "practice" : "exam");
  let score, scoreMax, exp, mult=0;
  if(runMode==="practice"){
    // 演習：1000点換算を廃止。実際の配点合計(total)を満点、獲得点を切り上げてスコア。EXP=スコア
    score = Math.ceil(earned);
    scoreMax = total;
    exp = score;
  } else {
    // 試験・復習：従来どおり1000点満点換算（変更しない）
    score = total ? Math.round(earned/total*1000) : 0;
    scoreMax = 1000;
    if(runMode==="exam"){ mult = examMult(score); exp = calcExp(score, "exam"); }
    else { exp = score; }   // 復習：従来どおり点数がそのままEXP
  }

  // EXPをBP(=経験値)として加算 → 資格内レベルと全体レベルの両方に反映
  const prevBp = getBP();
  const newBp = prevBp + exp;
  setBP(newBp);
  // コイン(AC)の獲得：試験はスコア帯で固定、演習・復習は正解数×3
  const coinGain = coinReward(runMode, correct, score);
  S.coins = (S.coins||0) + coinGain;
  saveCoins(S.coins);
  const unlocked = TIERS.filter(t=>t.bp>prevBp && t.bp<=newBp).map(t=>t.icon+" "+t.name);
  const modeLabel = (runMode==="review" ? "復習" : runMode==="practice" ? "演習" : "試験") + S.deck.length + "問";
  const entry = {id:Date.now(), date:new Date().toISOString(), modeLabel,
                 mode:runMode, mult, correct, total:S.deck.length, score, scoreMax, earned:Math.ceil(earned), totalPts:total,
                 bpGain:exp, bpTotal:newBp, coinGain, coinTotal:S.coins, unlocked, review:!!S.review};
  const h=[entry,...loadHist()].slice(0,50); saveHist(h);
  saveToCloud(newBp, wrongList, h);
  publishLeaderboard();   // ランキング（総合レベル・合計BP）も更新
  // 問題ごとの正答率を集計（出題+1・全問正解なら正答+1）
  if(window.QStats){
    const results = S.deck.map((q,i)=>({ qid:q.id, correct: grade(q,S.picks[i]).full }));
    window.QStats.record(S.cert, results);
  }

  S.last=entry; S.screen="result"; render();
}
function go(s){ S.screen=s; render(); }

// 右上の共通ステータスバー：上段=総合Lv／下段=選択中の資格Lv／右=AC。render()のたびに最新化
function renderStatusBar(){
  const el=document.getElementById("statusbar"); if(!el) return;
  // 認証前・ユーザー名未設定などプレイヤーが確定していない画面では非表示
  const gated = (!guestMode && !authReady)
             || (!guestMode && !currentUser)
             || (!guestMode && currentUser && (!profileChecked || !getProfileName()));
  if(gated){ el.classList.remove("show"); el.innerHTML=""; return; }
  const ov = overallStat();          // 上段：全資格合計から総合Lvと次Lvまでの進捗(%)
  const coins = (S.coins||0);

  // 下段：選択中の資格レベルと、次のリソース解放までの進捗（データセンターと同じロジック）
  let certRow = "";
  if(S.cert){
    const c = certById(S.cert) || {};
    const bp = getBP();
    const lvl = dcCount(bp);
    const next = TIERS.find(t=>t.bp>bp);
    let cpct;
    if(next){ const prevBp = lvl>0 ? TIERS[lvl-1].bp : 0; cpct = Math.max(0, Math.min(100, Math.round((bp-prevBp)/(next.bp-prevBp)*100))); }
    else cpct = 100;
    // どのリソース間の進捗か（例：VM → ストレージ）をツールチップに明示
    const curName = lvl>0 ? (TIERS[lvl-1].icon+" "+TIERS[lvl-1].name) : "スタート";
    const certTitle = next ? `${curName} → ${next.icon} ${next.name}（あと ${(next.bp-bp).toLocaleString()} BP）` : "全リソース稼働";
    certRow = `
      <div class="sb-line">
        <span class="sb-lab sb-lab-cert">${esc(c.code||"選択資格")} Lv.<b>${lvl}</b></span>
        <span class="sb-prog" title="${esc(certTitle)}"><span class="sb-prog-f cert" style="width:${cpct}%"></span></span>
      </div>`;
  }

  el.innerHTML = `
    <div class="sb-levels">
      <div class="sb-line">
        <span class="sb-lab">総合ランク Lv.<b>${ov.lv}</b></span>
        <span class="sb-prog" title="次の総合Lvまで ${ov.remain.toLocaleString()} BP"><span class="sb-prog-f overall" style="width:${ov.pct}%"></span></span>
      </div>
      ${certRow}
    </div>
    <span class="sb-div"></span>
    <span class="sb-coin">💰 <b>${coins.toLocaleString()}</b> AC</span>
  `;
  el.classList.add("show");
}

      }

      // Azure予約IPのチェック
      const lastOct = parseInt(vm.octet, 10);
      if (vmNum === sRange.start || vmNum === sRange.end || (lastOct >= 1 && lastOct <= 3)) {
        return { ok: false, msg: `⚠️ Azure予約IPエラー！\n末尾 .${lastOct} はネットワークアドレスやAzure予約IP（.1〜.3など）のため、VMに割り当てられません！` };

// ドラッグ＆ドロップ（タッチ＆マウス両対応・無料）。サブネット等の動的パーツにも対応
function ptAttachDrag(elem){
  const key = elem.dataset.key;
  const onStart = (e)=>{
    e.preventDefault();
    const it = PT_SHOP.find(s=>s.key===key);
    const ghost = document.createElement("div");
    ghost.className="pt-ghost"; ghost.textContent=it.icon;
    document.body.appendChild(ghost);
    const valid = ptValidZones(key);
    const move=(ev)=>{
      const p = ev.touches ? ev.touches[0] : ev;
      ghost.style.left = p.clientX+"px"; ghost.style.top = p.clientY+"px";
      ptHighlight(p.clientX, p.clientY, valid);
    };
    const end=(ev)=>{
      const p = ev.changedTouches ? ev.changedTouches[0] : ev;
      const zi = ptZoneAt(p.clientX, p.clientY);
      ghost.remove();
      ptClearHighlight();
      document.removeEventListener("touchmove",move,{passive:false});
      document.removeEventListener("touchend",end);
      document.removeEventListener("mousemove",move);
      document.removeEventListener("mouseup",end);
      ptDeploy(key, zi);
    };
    move(e);
    document.addEventListener("touchmove",move,{passive:false});
    document.addEventListener("touchend",end);
    document.addEventListener("mousemove",move);
    document.addEventListener("mouseup",end);
  };
  elem.addEventListener("touchstart", onStart, {passive:false});
  elem.addEventListener("mousedown", onStart);
}
function ptZoneEl(x,y){
  const el = document.elementFromPoint(x,y);
  return el && el.closest ? el.closest("[data-zone]") : null;
}
function ptZoneAt(x,y){
  const z = ptZoneEl(x,y);
  if(!z) return null;
  return { zone:z.dataset.zone, idx: (z.dataset.idx!=null ? parseInt(z.dataset.idx,10) : null) };
}
function ptHighlight(x,y,valid){
  ptClearHighlight();
  const z = ptZoneEl(x,y);
  if(z && valid.indexOf(z.dataset.zone)>=0) z.classList.add("pt-over");
}
function ptClearHighlight(){ document.querySelectorAll(".pt-over").forEach(e=>e.classList.remove("pt-over")); }
function ptMsg(txt, ok){
  const r=document.getElementById("pt-result"); if(!r) return;
  r.className = "pt-result " + (ok===true?"ok":(ok===false?"ng":""));
  r.innerHTML = txt;
}
// 配置（無料・データ追加のみ）。無効なドロップは黙って無視（自動ヒントは出さない）
function ptDeploy(key, zi){
  const inf = S.infra;
  const valid = ptValidZones(key);
  if(!zi || valid.indexOf(zi.zone)<0) return;
  if(key==="vnet"){
    if(inf.vnet) return;
    inf.vnet = true;
  } else if(key==="subnet"){
    if(!inf.vnet) return;
    inf.subnets.push({ prefix:"", vms:[] });
  } else if(key==="vm"){
    if(!inf.vnet) return;
    const i = zi.idx;
    if(i==null || !inf.subnets[i]) return;
    inf.subnets[i].vms.push({ octet:"" });
  } else if(key==="lb"){
    if(!inf.vnet || inf.lb) return;
    inf.lb = true;
  }
  renderSandbox();   // 入力値は S.infra に保存済みなので再描画で復元される
}

// 採点：現在のミッションのクリア条件で判定。失敗時は具体ヒントを自動表示しない
// 採点：現在のミッションのクリア条件で判定。ビット演算による詳細フィードバック版
function testInfra(){
  const res = currentMission.check(S.infra);
  
  // 判定が失敗（res.okがfalse、または真偽値でfalseが返った場合）
  if(!res || res.ok === false || res === false){
    const errMsg = res.msg || "❌ まだ構成が完成していません。右上の「❓」でヒントを確認しながら見直しましょう。";
    ptMsg(errMsg, false);
    return;
  }
  
  const id = currentMission.id;
  const already = missionCleared(id);
  let msg = `${"⭐".repeat(currentMission.stars)} ミッション達成！<br>「${esc(currentMission.title)}」をクリアしました。`;
  if(!already){
    const bp = missionBP(currentMission.stars);
    setBP(getBP() + bp);                         // 資格BPに加算 → レベル/ステータスバーへ反映
    if(!S.clearedMissions) S.clearedMissions=[];
    S.clearedMissions.push(id);
    try{ localStorage.setItem("portal_done_"+id, "1"); }catch(e){}
    msg += `<br>🎉 初クリア報酬 <b>+${bp.toLocaleString()} BP</b> 獲得！レベルに反映されました。`;
    try{ publishLeaderboard(); }catch(e){}        // ランキングも更新
    try{ saveToCloud(getBP(), loadWrong(), loadHist()); }catch(e){}  // クラウド同期
  } else {
    msg += "<br>（このミッションの報酬は獲得済みです）";
  }
  renderSandbox();
  renderStatusBar();   // 最上部のBPバー・レベルに即反映
  ptMsg(msg, true);
}

function authErrorMsg(e){
  const c=(e&&(e.code||e.message))||"";
  if(c.indexOf("email-already-in-use")>=0) return "このメールアドレスは既に登録されています。「ログイン」に切り替えてください。";
  if(c.indexOf("invalid-email")>=0) return "メールアドレスの形式が正しくありません。";
  if(c.indexOf("weak-password")>=0) return "パスワードは6文字以上にしてください。";
  if(c.indexOf("wrong-password")>=0 || c.indexOf("invalid-credential")>=0) return "メールアドレスまたはパスワードが違います。";
  if(c.indexOf("user-not-found")>=0) return "アカウントが見つかりません。新規登録してください。";
  if(c.indexOf("too-many-requests")>=0) return "試行回数が多すぎます。少し時間をおいて再度お試しください。";
  if(c.indexOf("operation-not-allowed")>=0) return "メール認証が有効化されていません（Firebaseの設定が必要です）。";
  if(c.indexOf("network")>=0) return "通信エラーです。ネット接続を確認してください。";
  return "エラー: " + ((e&&e.message)||c||"不明");
}

    if(authBusy) return;
    const email=(emailEl.value||"").trim(), pw=pwEl.value||"";
    if(!email || !pw){ msg.style.color="var(--gold)"; msg.textContent="メールアドレスとパスワードを入力してください。"; return; }
    if(!window.Auth){ msg.style.color="var(--bad)"; msg.textContent="認証の準備中です。少し待って再度お試しください。"; return; }

async function deleteAccount(password){

  try{

      localStorage.removeItem("cert_"+c.id+"_history");
    });
    localStorage.removeItem("profile_name");
    localStorage.removeItem("coins");
    MISSIONS.forEach(mn=>localStorage.removeItem("portal_done_"+mn.id));
  }catch(e){}
  // 認証削除で onAuthStateChanged(null) が発火しログイン画面へ遷移するが、保険で状態も初期化
  cloudData=null; currentUser=null; currentUserId=null; profileChecked=false; guestMode=false; S.coins=0;

function renderResult(){
  const e=S.last;
  const max = e.scoreMax || 1000;
  const ratio = max ? Math.min(1, e.score/max) : 0;
  const R=80, C=2*Math.PI*R, off=C*(1-ratio);
  const isExam = (e.mode==="exam");
  const isPractice = (e.mode==="practice");
  const passed = isExam ? (e.score>=PASS) : (ratio>=0.7);
  const t={high:[0,0],mid:[0,0],low:[0,0]};
  S.deck.forEach((q,i)=>{ const k=q.imp>=4?"high":(q.imp===3?"mid":"low"); t[k][1]++; if(grade(q,S.picks[i]).full)t[k][0]++; });
  const TLAB={high:"重要度 高 (4-5)", mid:"重要度 中 (3)", low:"重要度 低 (1-2)"};
  const gain = (e.bpGain!=null) ? e.bpGain : e.score;
  let expLine, verdictTxt, verdictPass, subLine;
  if(isPractice){
    expLine = "演習モード：獲得した配点合計がそのまま EXP";
    verdictTxt = "演習完了"; verdictPass = ratio>=0.7;
    subLine = `獲得 ${e.score} / ${max} 点（実際の配点合計・部分点込み・小数切り上げ）`;
  } else if(e.mode==="review"){
    expLine = "復習：点数がそのまま EXP";
    verdictTxt = "復習完了"; verdictPass = e.score>=PASS;
    subLine = `獲得 ${e.earned} / ${e.totalPts} 点 → 1000点換算で ${e.score} 点`;
  } else { // 試験モード（1000点満点換算・従来どおり）
    expLine = gain>0 ? `試験モード：${e.score}点 × ${e.mult} = ${gain} EXP` : "試験モード：700点未満のため EXP 獲得なし";
    verdictPass = passed; verdictTxt = passed ? "合格！ボーナス EXP 獲得" : "不合格（700点未満）・EXP なし";
    subLine = `獲得 ${e.earned} / ${e.totalPts} 点（重み付け・部分点込み）→ 1000点換算で ${e.score} 点`;
  }
  app.innerHTML = `
    <div class="gauge-wrap">
      <svg viewBox="0 0 200 200" class="gauge">
        <circle cx="100" cy="100" r="${R}" class="gauge-bg"></circle>
        <circle cx="100" cy="100" r="${R}" class="gauge-fg ${verdictPass?"pass":"fail"}"
          stroke-dasharray="${C}" stroke-dashoffset="${C}" transform="rotate(-90 100 100)"></circle>
      </svg>
      <div class="gauge-mid"><div class="gauge-score">${e.score}</div><div class="gauge-max">/ ${max}</div></div>
    </div>
    <div class="verdict ${verdictPass?"pass":"fail"}">${verdictTxt}</div>
    <div class="result-meta">完全正解 ${e.correct} / ${e.total} 問</div>
    <div class="result-sub">${subLine}</div>
    <div class="breakdown">
      ${Object.keys(t).filter(k=>t[k][1]>0).map(k=>`
        <div class="bd-row"><span class="bd-lab" style="width:96px">${TLAB[k]}</span>
        <div class="bd-bar"><div class="bd-fill" style="width:${t[k][0]/t[k][1]*100}%"></div></div>
        <span class="bd-num">${t[k][0]}/${t[k][1]}</span></div>`).join("")}
    </div>
    <div class="bp-card">
      <div class="bp-row"><span>⚡ 獲得EXP</span><span class="bp-gain">+${gain} EXP</span></div>
      <div class="bp-exp-line">${esc(expLine)}</div>
      <div class="bp-total">資格内＆全体レベルに加算 ・ 累計 ${(e.bpTotal||getBP()).toLocaleString()} BP</div>
      ${(e.unlocked&&e.unlocked.length)?`<div class="bp-unlock">🎉 新たに稼働：${e.unlocked.map(esc).join("、")}</div>`:""}
      <button class="bp-link" data-go="dc">データセンターを見る →</button>
    </div>
    <div class="coin-card">
      <div class="coin-row"><span class="coin-ic">💰</span><span class="coin-gain">+${(e.coinGain!=null?e.coinGain:0)} AC 獲得！</span></div>
      <div class="coin-total">現在の総所持：${(e.coinTotal!=null?e.coinTotal:(S.coins||0)).toLocaleString()} AC</div>
    </div>
    <div class="actions">
      <button class="cta" data-go="review">解答・解説を確認</button>
      <button class="ghost" data-retry>もう一度挑戦</button>
      <button class="ghost" data-go="home">🏠 ホームへ戻る</button>
    </div>
  `;
  requestAnimationFrame(()=>{ const c=app.querySelector(".gauge-fg"); if(c)c.style.strokeDashoffset=off; });
  app.querySelector("[data-retry]").onclick=()=>{ if(S.review){ if(loadWrong().length) startReview(); else go("home"); } else start(S.mode); };
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
}

function renderReview(){
  const rows = S.deck.map((q,i)=>{
    const sel=S.picks[i]||[], cor=correctSet(q), g=grade(q,sel), W=pts(q), multi=isMulti(q);
    let kind,label;
    if(g.full){ kind="ok"; label="正解"; }
    else if(g.earned>0){ kind="partial"; label="一部正解"; }
    else { kind="ng"; label="不正解"; }
    const opts = q.o.map((opt,j)=>{
      const isCor=cor.indexOf(j)>=0, picked=sel.indexOf(j)>=0;
      let cls="opt"; let mark="";
      if(isCor){ cls+=" correct"; mark='<span class="opt-mark">✓</span>'; }
      else if(picked){ cls+=" wrong"; mark='<span class="opt-mark">✕</span>'; }
      else cls+=" dim";
      return `<div class="${cls}"><span class="opt-key${multi?" box":""}">${L[j]}</span><span class="opt-label">${esc(opt)}</span>${mark}</div>`;
    }).join("");
    const earnTxt = `獲得 ${Math.round(g.earned*10)/10} / ${W} 点`;
    return `<div class="review-q">
      <div class="review-num"><span>第 ${i+1} 問 ・ 重要度 ${q.imp}${multi?" ・ 複数選択":""}</span><span class="rv-tag ${kind}">${label}・${earnTxt}</span></div>
      <p class="q-text">${esc(q.q)}</p>
      <div class="opts">${opts}</div>
      <div class="expl ${kind}"><strong>解説</strong><span>${esc(q.e)}</span></div>
      <div class="qstat" id="qstat-${q.id}">📊 全体正答率：<span class="qstat-v">—</span></div>
    </div>`;
  }).join("");
  app.innerHTML = `
    <div class="q-head"><button class="quit" data-go="result">← 結果へ</button><span class="q-count">解答・解説</span></div>
    ${rows}
    <button class="ghost" data-go="home">🏠 ホームへ戻る</button>
  `;
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
  loadReviewStats();
  window.scrollTo(0,0);
}

// 正答率（%）：correct/attempts×100 を小数第1位（第2位四捨五入）で。データ無しはnull
function qRate(st){ if(!st || !st.attempts) return null; return Math.round((st.correct/st.attempts)*1000)/10; }
// 解説画面の各問に全体正答率を非同期で流し込む
async function loadReviewStats(){
  if(!window.QStats || !S.cert || !S.deck) return;
  const qids = S.deck.map(q=>q.id);
  let map={};
  try{ map = await window.QStats.getMany(S.cert, qids); }catch(e){ return; }
  S.deck.forEach(q=>{
    const box=document.getElementById("qstat-"+q.id); if(!box) return;
    const v=box.querySelector(".qstat-v");
    const st=map[q.id], rate=qRate(st);
    if(rate===null){ v.textContent="データなし（まだ集計がありません）"; }
    else { v.textContent = rate + "%"; v.title = (st.correct||0)+" / "+(st.attempts||0)+" 回正解"; box.insertAdjacentHTML("beforeend", `<span class="qstat-n">（${st.correct}/${st.attempts}）</span>`); }
  });
}

let dictSort = "theme"; // theme | aiueo

function renderDict(){
  const items = CONCEPTS.map((c,i)=>({c,i}));
  if(dictSort==="aiueo") items.sort((a,b)=>a.c.t.localeCompare(b.c.t,"ja"));
  app.innerHTML = `
    <div class="q-head"><button class="quit" data-go="home">🏠 ホーム</button><span class="q-count">用語辞典</span></div>
    <input id="dict-search" class="dict-search" placeholder="用語を検索（例：RBAC、冗長、ゼロトラスト）" autocomplete="off">
    <div class="dict-bar">
      <span id="dict-count">${CONCEPTS.length} 語</span>
      <button id="dict-sort" class="dict-sortbtn">${dictSort==="theme"?"並び：テーマ順":"並び：あいうえお順"}</button>
    </div>
    <div id="dict-list">
      ${items.map(({c})=>`
        <div class="dict-card" data-text="${esc((c.t+' '+c.m+' '+c.k.map(k=>k.l).join(' ')).toLowerCase())}">
          <div class="dict-term">${esc(c.t)}</div>
          <div class="dict-def">${esc(c.m)}</div>
          ${c.k.length?`<div class="dict-points">${c.k.map(k=>`<span class="dict-pt">${esc(k.l)}</span>`).join("")}</div>`:""}
        </div>`).join("")}
    </div>
  `;
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
  const sb=document.getElementById("dict-search");
  const list=document.getElementById("dict-list");
  const cnt=document.getElementById("dict-count");
  if(sb) sb.oninput=()=>{
    const q=sb.value.trim().toLowerCase(); let n=0;
    list.querySelectorAll(".dict-card").forEach(card=>{
      const show=!q || card.dataset.text.indexOf(q)>=0;
      card.style.display=show?"":"none"; if(show)n++;
    });
    cnt.textContent = q ? (n+" 語 ヒット") : (CONCEPTS.length+" 語");
  };
  const srt=document.getElementById("dict-sort");
  if(srt) srt.onclick=()=>{ dictSort = dictSort==="theme"?"aiueo":"theme"; render(); };
  window.scrollTo(0,0);
}

/* ---- データセンターの「時代（フェーズ）」とビジュアル進化 ----
   資格レベル(n=稼働リソース数)で背景の世界観が変わる。
   グローバル期になると背景が世界地図になり、各拠点が点灯する。 */
const DC_PHASES = [
  { min:0,  band:"b1", name:"ガレージ期",     note:"プレハブにラックを設置" },
  { min:4,  band:"b2", name:"オンプレ脱却期", note:"空調と配線の整った建物へ" },
  { min:7,  band:"b3", name:"リージョン期",   note:"複数棟のキャンパスに拡張" },
  { min:10, band:"b4", name:"グローバル期",   note:"世界中に拠点が点灯", worldmap:true },
];
function dcPhase(n){ return DC_PHASES.filter(p=>n>=p.min).pop() || DC_PHASES[0]; }

/* Azureリージョン（座標は地図SVG viewBox 320×130 上の位置）。lv=点灯に必要なレベル */
const REGIONS = [
  { name:"東京",        x:270, y:52, lv:10 },
  { name:"シンガポール", x:248, y:80, lv:10 },
  { name:"バージニア",   x:78,  y:50, lv:11 },
  { name:"西ヨーロッパ", x:160, y:40, lv:11 },
  { name:"カリフォルニア", x:38, y:52, lv:12 },
  { name:"シドニー",     x:292, y:106, lv:12 },
  { name:"ブラジル",     x:96,  y:90, lv:12 },
];
function worldMapSVG(n){
  const dots = REGIONS.map(r=>{
    const on = n>=r.lv;
    return `<g class="rg ${on?'on':'off'}">
      ${on?`<circle class="rg-glow" cx="${r.x}" cy="${r.y}" r="7"/>`:''}
      <circle class="rg-dot" cx="${r.x}" cy="${r.y}" r="${on?3:2}"/>
      ${on?`<text class="rg-nm" x="${r.x}" y="${r.y-8}">${esc(r.name)}</text>`:''}
    </g>`;
  }).join("");
  const grat = [26,52,78,104].map(y=>`<line x1="0" y1="${y}" x2="320" y2="${y}"/>`).join("")
             + [64,128,192,256].map(x=>`<line x1="${x}" y1="0" x2="${x}" y2="130"/>`).join("");
  return `<svg class="scene-map" viewBox="0 0 320 130" preserveAspectRatio="xMidYMid slice">
    <g class="grat">${grat}</g>
    <g class="land">
      <path d="M30,30 L70,26 L88,46 L80,72 L96,96 L86,116 L66,112 L58,84 L40,66 L34,46 Z"/>
      <path d="M150,26 L182,30 L188,52 L172,74 L176,96 L160,104 L150,82 L156,58 L146,42 Z"/>
      <path d="M205,28 L280,24 L300,44 L282,58 L250,62 L232,52 L210,50 Z"/>
      <path d="M276,96 L302,98 L300,114 L280,112 Z"/>
    </g>
    ${dots}
  </svg>`;
}

function homeScene(){
  const bp=getBP(), n=dcCount(bp), ph=dcPhase(n);
  const band=ph.band;
  const starN = band==="b4"?16:(band==="b3"?9:0);
  let stars="";
  for(let i=0;i<starN;i++){ stars+=`<span class="scene-star" style="left:${(i*37%92)+3}%;top:${(i*29%48)+6}%;animation-delay:${(i%5)*0.4}s"></span>`; }
  let body;
  if(ph.worldmap){
    body = worldMapSVG(n);
  } else {
    const ons=TIERS.filter(t=>bp>=t.bp);
    const sizes=[26,31,24,33,28,35,25,30,23,34,27,32];
    const builds = ons.map((t,i)=>`<span class="scene-b" style="font-size:${sizes[i%sizes.length]}px">${t.icon}</span>`).join("");
    const next=TIERS.find(t=>t.bp>bp);
    const tail = next?`<span class="scene-ghost">🏗️</span>`:"";
    body = `<div class="scene-ground">${builds}${tail}</div>`;
  }
  return `<div class="home-scene ${band}">
    ${stars}
    <div class="scene-info"><span class="scene-lvl">Lv.${n} ${esc(ph.name)}</span><span class="scene-bp">${bp.toLocaleString()} BP</span></div>
    ${body}
  </div>`;
}

function renderDC(){
  const bp=getBP(), n=dcCount(bp), next=TIERS.find(t=>t.bp>bp), ph=dcPhase(n);
  let prog, nextTxt;
  if(next){
    const prevBp = n>0 ? TIERS[n-1].bp : 0;
    prog = Math.round((bp-prevBp)/(next.bp-prevBp)*100);
    nextTxt = `次の「${next.icon} ${next.name}」まであと ${(next.bp-bp).toLocaleString()} BP`;
  } else { prog=100; nextTxt="すべてのリソースが稼働中！"; }
  const nextPhase = DC_PHASES.find(p=>p.min>n);

/* ======================= データ引き継ぎ（保存・復元） ======================= */
function b64e(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64d(b64){ return decodeURIComponent(escape(atob(b64))); }
function hash36(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h*33)^s.charCodeAt(i))>>>0; } return h.toString(36); }

function exportCode(){
  const payload={v:1, bp:getBP(), wrong:loadWrong(), hist:loadHist()};
  const base=JSON.stringify(payload);
  payload.sig=hash36(base);
  return "AZ9-"+b64e(JSON.stringify(payload));
}
function importCode(code){
  code=(code||"").trim().replace(/\s/g,"");
  if(code.indexOf("AZ9-")===0) code=code.slice(4);
  if(!code) throw new Error("コードが空です");
  let obj;
  try{ obj=JSON.parse(b64d(code)); }catch(e){ throw new Error("コードを読み取れませんでした"); }
  if(!obj || obj.v!==1) throw new Error("対応していないコード形式です");
  const sig=obj.sig; delete obj.sig;
  if(hash36(JSON.stringify(obj))!==sig) throw new Error("コードが壊れているか、入力ミスがあります");
  if(typeof obj.bp==="number" && obj.bp>=0) setBP(obj.bp);
  if(Array.isArray(obj.wrong)) saveWrong(obj.wrong);
  if(Array.isArray(obj.hist)) saveHist(obj.hist);
  return obj;
}

function renderTransfer(){
  const code=exportCode();
  const h=loadHist();
  app.innerHTML = `
    <div class="q-head"><button class="quit" data-go="home">🏠 ホーム</button><span class="q-count">データ引き継ぎ</span></div>
    <p class="x-hint" style="margin-top:0;margin-bottom:14px">スコア履歴・ビルドポイント・復習リストを1本のコードにまとめて保存／復元できます。アカウント登録は不要です。</p>

    <div class="x-sub" style="margin-top:0">① 引き継ぎコードを書き出す</div>
    <p class="x-hint" style="margin-top:0;margin-bottom:8px">下のコードをメモ帳などにコピーして保管してください（履歴 ${h.length}件・${getBP().toLocaleString()} BP）。</p>
    <textarea id="tf-out" class="x-area" readonly style="min-height:96px;font-size:12px">${esc(code)}</textarea>
    <button class="cta" id="tf-copy" style="margin-top:10px">コードをコピー</button>

    <div class="dc-sub">② コードから復元する</div>
    <p class="x-hint" style="margin-top:0;margin-bottom:8px">控えておいたコードを貼り付けて復元します。<b style="color:var(--gold)">この端末の現在のデータは上書き</b>されます。</p>
    <textarea id="tf-in" class="x-area" placeholder="AZ9-... を貼り付け" style="min-height:96px;font-size:12px"></textarea>
    <button class="ghost" id="tf-load" style="margin-top:10px">このコードで復元する</button>
    <div id="tf-msg" class="x-hint" style="margin-top:12px"></div>
  `;
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
  const msg=document.getElementById("tf-msg");
  const setMsg=(t,c)=>{ msg.innerHTML=t; msg.style.color=c||"var(--muted)"; };

  document.getElementById("tf-copy").onclick=()=>{
    const ta=document.getElementById("tf-out");
    ta.focus(); ta.select(); ta.setSelectionRange(0,99999);
    let ok=false;
    try{ ok=document.execCommand("copy"); }catch(e){}
    if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(()=>{},()=>{}); ok=true; }
    setMsg(ok?"✓ コピーしました。メモ帳やメールに貼り付けて保管してください。":"自動コピーできませんでした。コードを長押しで選択してコピーしてください。", ok?"var(--good)":"var(--gold)");
  };

  document.getElementById("tf-load").onclick=()=>{
    const v=document.getElementById("tf-in").value;
    if(!v.trim()){ setMsg("コードを貼り付けてください。","var(--gold)"); return; }
    if(!confirm("この端末の現在のデータ（履歴・BP・復習リスト）を、入力したコードの内容で上書きします。よろしいですか？")) return;
    try{
      const obj=importCode(v);
      setMsg("✓ 復元しました（履歴 "+( (obj.hist||[]).length )+"件・"+(obj.bp||0).toLocaleString()+" BP）。ホームに戻ります。","var(--good)");
      setTimeout(()=>go("home"), 900);
    }catch(e){
      setMsg("⚠ "+esc(String(e.message||e))+"。コードをもう一度確認してください。","var(--bad)");
    }
  };
  window.scrollTo(0,0);
}
