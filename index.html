 {id:29,imp:4,q:"Microsoft Entra ID から、オンプレミスのデータセンターで実行されている Web アプリケーションにユーザー サインオン トークンを安全に渡すためのサービスはどれですか？",o:["Azure Firewall","Microsoft Entra アプリケーション プロキシ","Application Gateway","プライベート ネットワーク コネクタ"],a:1,e:"Microsoft Entra アプリケーション プロキシ サービスとコネクタを連携させることで、オンプレミス アプリへの安全なアクセスを提供します。"},
 {id:30,imp:1,q:"Microsoft Entra Internet Access において、Microsoft トラフィック転送プロファイルを有効にする主な目的は何ですか？",o:["グローバル セキュア アクセス クライアントをバイパスさせるため","Exchange Online や SharePoint Online などの Microsoft サービスに送信されるトラフィックを取得するため","インターネットの脅威からユーザーのデバイスを保護するため","リモートネットワークの名前を定義するため"],a:1,e:"Microsoft プロファイルを有効にすると、Exchange Online などの Microsoft サービスに送信されるトラフィックを取得して制御できるようになります。"},
 {id:31,imp:3,c:[0,3],q:"Azure portal を使用して、アプリケーションの「アプリ ロール」を宣言（作成）する方法を選択してください。",o:["アプリ マニフェスト エディターを使用する","証明書とシークレットを使用する","API のアクセス許可を使用する","アプリ ロールの UI を使用する"],e:"アプリ ロールは、Azure portal の「アプリ ロール」UI を使用するか、アプリ マニフェスト エディターを直接編集して宣言できます。"},
 {id:32,imp:2,q:"エンタイトルメント管理において、プロジェクトでの作業やタスクの実行に必要となるすべてのリソースとアクセス権をバンドルしたものは何と呼ばれますか？",o:["セキュリティ グループ","アクセス パッケージ","アプリケーション コレクション","管理単位"],a:1,e:"アクセス パッケージは、ユーザーがプロジェクトの作業等を行うために必要なリソースへのアクセス権をまとめてパッケージ化したものです。"},
 {id:33,imp:1,q:"Microsoft Entra B2B コラボレーション機能を使用して外部ユーザー（ゲスト）を招待できる対象は、ディレクトリやグループの他にどれがありますか？",o:["ネットワーク プリンター","アプリケーション","オンプレミスの Active Directory ドメイン","Azure サブスクリプションの課金プロファイル"],a:1,e:"B2B コラボレーション ユーザーは、ディレクトリやグループに加えて、アプリケーションにも直接招待することができます。"},
 {id:34,imp:3,c:[0,1,2,3],q:"Microsoft Defender for Cloud Apps の Cloud Discovery 機能において、検出されたアプリを分析するために使用できるフィルターを選択してください。",o:["アプリ タグ","リスク スコア","コンプライアンス リスク要因","使用状況"],e:"Cloud Discovery では、アプリ タグ、リスク スコア、コンプライアンス リスク要因、使用状況など、さまざまな条件で検出されたアプリをフィルター処理できます。"},
 {id:35,imp:4,q:"組織の「使用条件（Terms of Use）」への同意をユーザーに要求するための最も簡単な構成方法は何ですか？",o:["セキュリティの既定値群を有効にする","条件付きアクセス ポリシーを介して同意を要求する","Privileged Identity Management (PIM) を構成する","アクセス レビューをスケジュールする"],a:1,e:"使用条件を構成する簡単な方法は、条件付きアクセス ポリシーのアクセス制御を使用して使用条件への同意を要件として設定することです。"},
 {id:36,imp:5,q:"「セキュリティの既定値群（Security defaults）」を有効にした場合、適用されるポリシーと同等の構成はどれですか？",o:["すべてのユーザーに MFA (多要素認証) を要求する","リスクの高いサインインをブロックする","パスワードの有効期限を 90 日に設定する","ゲスト ユーザーの招待を禁止する"],a:0,e:"セキュリティの既定値群では、すべてのユーザーに対する MFA の登録・要求や、管理者への MFA 要求、レガシ認証のブロックなどが既定で適用されます。"},
 {id:37,imp:2,q:"Privileged Identity Management (PIM) の「検出と洞察 (Discovery and insights)」機能は、組織にどのような利点を提供しますか？",o:["ゲスト ユーザーがリソースにアクセスした時刻の履歴を提供する。","Microsoft Entra ID 全体から特権ロールの割り当てを見つけ、PIM などのガバナンス機能を使用してそれらを保護する方法の推奨事項を提供する。","セキュリティ グループの割り当てのみを見つけ、保護する。","自動的にすべての永続的な特権ロールを適格なロールに変換する。"],a:1,e:"PIM の検出と洞察機能により、環境内の特権ロールの割り当て状況を把握し、セキュリティで保護するための推奨事項を得ることができます。"},
 {id:38,imp:4,q:"Microsoft Entra Private Access の主な機能は何ですか？",o:["インターネットの脅威からユーザー、デバイス、データを保護する。","アクセス制御機能のロールアウトと管理を効率化する統合ポータルを提供する。","VPN を必要とせずに、プライベートな企業リソースへの安全なアクセスをユーザーに提供する。","Exchange Online や SharePoint Online に送信されるトラフィックを取得する。"],a:2,e:"Microsoft Entra Private Access は、従来の VPN を使用せずに、プライベート リソースへのセキュリティで保護されたアクセスを提供します。"},
 {id:39,imp:3,c:[0,1,4],q:"Microsoft Entra ID における「パスワードレス認証」としてサポートされているソリューションをすべて選択してください。",o:["FIDO2 セキュリティ キー","Microsoft Authenticator アプリ","OATH ハードウェア トークン","セキュリティの質問","Windows Hello for Business"],e:"Windows Hello for Business、FIDO2 セキュリティ キー、および Microsoft Authenticator アプリは、Microsoft Entra ID のパスワードレス ソリューションとしてサポートされています。"},
 {id:40,imp:5,q:"条件付きアクセス ポリシーにおける「サインインの頻度」の制御とは、何を定義するものですか？",o:["24 時間の間にユーザーが 1 つのデバイスからサインインする回数。","ユーザーがリソースにアクセスしようとしたときに、再度サインインを求められるまでの時間。","1 人のユーザーが同時にサインインできるデバイスの最大数。","ロックアウトされるまでに入力を間違えることができるパスワードの回数。"],a:1,e:"サインインの頻度は、リソースにアクセスする際にユーザーに再認証（サインイン）を求めるまでの期間を定義するセッション制御です。"},
 {id:41,imp:1,q:"Microsoft Entra のエンタイトルメント管理における「アクセス パッケージ」とは何ですか？",o:["B2B 組織間に推移的な信頼を作成するためのプロトコル。","プロジェクトの作業を行ったりタスクを遂行したりするために必要となるすべてのリソースと、そのアクセス権をバンドルしたもの。","ユーザーに割り当てられる Microsoft Entra Premium ライセンスのセット。","デバイスを組織に参加させるための登録ファイル。"],a:1,e:"アクセス パッケージを使用すると、ユーザーが特定のプロジェクトや役割を果たすために必要なリソース（グループ、アプリ、サイトなど）へのアクセス権をまとめて管理できます。"},
 {id:42,imp:3,c:[0,1,3],q:"Microsoft Entra ID において、ユーザーを定義する種類（アカウントの種類）として該当するものをすべて選択してください。",o:["クラウド ID","ゲスト ユーザー","接続されていないユーザー","ディレクトリ同期 ID"],e:"Microsoft Entra ID では、主にクラウド ID、ゲスト ユーザー、およびオンプレミスから同期されたディレクトリ同期 ID の 3 つの方法でユーザー アカウントが定義されます。"},
 {id:43,imp:4,q:"Microsoft Entra グループベース ライセンス管理を使用している場合、グループのメンバーシップが変更されてから、ユーザーのライセンスの変更が有効になるまで、通常どれくらいの時間がかかりますか？",o:["即時（リアルタイム）","メンバーシップの変更から数分以内","メンバーシップの変更から 24 時間以内","次回のローカル ドメイン コントローラーの同期時内"],a:1,e:"グループのメンバーシップが変更されると、通常は数分以内にシステムがライセンスの割り当てや削除の変更を処理して適用します。"},
 {id:44,imp:2,q:"Microsoft Entra ID で作成できるグループの種類のうち、共有メールボックス、予定表、SharePoint サイトなどへのアクセスを提供し、コラボレーションを目的とするものはどれですか？",o:["セキュリティ グループ","Microsoft 365 グループ","配布グループ","動的デバイス グループ"],a:1,e:"Microsoft M365 グループは、チーム メンバー間のコラボレーションを促進し、共有メールボックスやカレンダーなどのリソースへのアクセスを提供するために使用されます。"},
 {id:45,imp:5,q:"Microsoft Entra ID において「カスタム セキュリティ属性」を使用することで得られる主な利点は何ですか？",o:["すべてのグループ メンバーに対して同じライセンスを一括で割り当てることができる。","ゲスト ユーザーのアカウントを一定期間後に自動的に削除できる。","グループ メンバーシップではなく、特定のユーザー属性を使用してより詳細なアクセス制御を可能にする。","パスワードの有効期限ポリシーをテナント全体でオーバーライドできる。"],a:2,e:"カスタム セキュリティ属性を使用すると、従来のグループ メンバーシップに基づく制御だけでなく、属性（プロジェクト名や部門など）に基づいたききめ細かいアクセス制御（ABAC）が可能になります。"},
 {id:46,imp:3,c:[0,1,3],q:"「ゼロ トラスト」セキュリティ モデルの基本となる 3 つの原則（テナント）をすべて選択してください。",o:["明示的に確認する","最小特権を使用する","単一の境界で防御する","侵害を想定する"],e:"ゼロ トラスト アーキテクチャは、「明示的に確認する」「最小特権の原則を適用する」「侵害を想定する」という 3 つのコア原則に基づいています。"},
 {id:47,imp:1,q:"Microsoft Defender for Cloud Apps は、組織にどのような機能を提供するソリューションですか？",o:["オンプレミスの Active Directory ドメイン コントローラーを保護する。","クラウド アプリに対する Microsoft のクラウド アクセス セキュリティ ブローカー (CASB) として機能する。","仮想マシンへのリモート デスクトップ アクセスを安全に管理する。","デバイスのローカル ディスクを暗号化する。"],a:1,e:"Microsoft Defender for Cloud Apps は、シャドウ IT の検出、情報の保護、およびサイバー脅威からの保護を提供する CASB ソリューションです。"},
 {id:48,imp:4,q:"Azure リソースに対して Azure ロール（共同作成者など）を特定のユーザーに割り当てるために使用できるツールの組み合わせとして、正しいものはどれですか？",o:["Azure portal のみ","PowerShell と CLI を使用したスクリプティングのみ","Azure portal、PowerShell、および CLI","Microsoft Entra 管理センターのみ"],a:2,e:"Azure ロールの割り当ては、Azure portal のグラフィカル インターフェイスから行うことも、PowerShell や Azure CLI を使用してプログラムで実行することも可能です。"},
 {id:49,imp:3,c:[0,2],q:"Azure リソースに対するアクセス認証を簡素化する「マネージド ID」の 2 つの種類をすべて選択してください。",o:["ユーザー割り当てマネージド ID","グループ割り当てマネージド ID","システム割り当てマネージド ID","動的割り当てマネージド ID"],e:"マネージド ID には、リソースのライフサイクルに直接関連付けられる「システム割り当て」と、独立したリソースとして作成される「ユーザー割り当て」の 2 種類があります。"},
 {id:50,imp:2,q:"要求ベース（クレーム ベース）認証において、ユーザーがサインインした際に Microsoft Entra ID はどのような処理を行いますか？",o:["ユーザーに関するクレームのセットを含むアクセス トークンを作成して送信する。","ユーザーが持つすべてのアクセス特権を各アプリケーションと個別に共有する。","オンプレミスの Active Directory に直接 Kerberos チケットを要求する。","ブロックチェーン ストアに検証済み ID を発行する。"],a:0,e:"要求ベースの認証では、ユーザーがサインインに成功すると、ID プロバイダー（Microsoft Entra ID）がユーザーの ID 情報（クレーム）を含むセキュリティ トークンを発行し、それをアプリケーションに渡します。"},
 {id:51,imp:5,q:"「Microsoft Entra 権限管理（Permissions Management）」が提供する主な機能は何ですか？",o:["オンプレミスの Active Directory のユーザー パスワードをクラウドと同期する。","クラウド インフラストラクチャ全体 (Azure、AWS、GCP) で、すべての ID とリソースに割り当てられたアクセス許可を可視化し、最小特権アクセスを実現する。","モバイル デバイスにデバイス管理プロファイルを適用し、条件付きアクセス ポリシーの準拠状態を判定する。","外部ユーザーに一時的なアクセス権を付与するためのアクセス パッケージを生成する。"],a:1,e:"Microsoft Entra 権限管理は、マルチクラウド環境における過剰なアクセス許可や未使用のアクセス許可を検出し、適正なサイズに変更するためのクラウド インフラストラクチャ エンタイトルメント管理 (CIEM) ツールです。"},
 {id:52,imp:2,q:"Microsoft Entra Identity Protection で構成できる 2 つの主要なリスク ポリシーのうち、1 つは「ユーザー リスク ポリシー」です。もう 1 つは何ですか？",o:["デバイス リスク ポリシー","サインイン リスク ポリシー","アクセス トークン リスク ポリシー","パスワード リスク ポリシー"],a:1,e:"Identity Protection では、主に「ユーザー リスク ポリシー」と「サインイン リスク ポリシー」の2つのポリシーを構成して、リスクに応じたMFA要求やパスワードリセットなどの修復を自動化します。"},
 {id:53,imp:1,q:"Microsoft Entra ID では、通常 3 つの方法でユーザーを定義します。「クラウド ID」と「ゲスト ユーザー」以外の 3 つ目の方法は何ですか？",o:["接続されていないユーザー","ローカル アカウント","ディレクトリ同期 ID","一時アクセス ユーザー"],a:2,e:"ユーザー アカウントは主に「クラウド専用（クラウド ID）」「外部コラボレーション用（ゲスト ユーザー）」、そしてオンプレミスの Active Directory から Microsoft Entra Connect で同期される「ディレクトリ同期 ID」の3種類で定義されます。"},
 {id:54,imp:3,c:[0,1,3],q:"Microsoft Graph API を使用して、Identity Protection の「危険なユーザー」と「サインイン」に関する情報を取得するために利用できる API をすべて選択してください。",o:["riskDetection","riskyUsers","itemActivity","signIns","IdentitySet"],e:"Identity Protection のデータを取得・統合するには、Microsoft Graph の riskDetection、riskyUsers、および signIns API を使用します。"},
 {id:55,imp:4,q:"Microsoft Entra にアプリケーションを登録する主な目的は何ですか？",o:["ユーザーのデバイスに対するスコープのアクセス許可を要求するため。","使われているアプリケーションが ID システムによって認識され、ユーザーがアプリにアクセスできるようにするため。","すべてのユーザーに Microsoft Authenticator を強制するため。","サインイン ダイアログ ボックス内でブランド化をカスタマイズするため。"],a:1,e:"アプリケーションが Microsoft Entra ID を使用して認証と承認を行うには、まず「アプリの登録」を行って ID プラットフォームに認識させる必要があります。"},
 {id:56,imp:5,q:"「ハイブリッド ID ソリューション」を決定付ける主な特徴は何ですか？",o:["クラウド専用ユーザーの認証をオンプレミスの AD に依存させる。","オンプレミスとクラウドベースの両方のリソースに対する認証と承認のために、共通のユーザー ID が作成される。","組織間の承認のために、推移的な信頼を作成する。","すべてのオンプレミス サーバーをクラウドに移行する。"],a:1,e:"ハイブリッド ID の最大の目的は、オンプレミス環境とクラウド環境の境界を越え、両方のリソースに対して同じ認証情報（共通のユーザー ID）でアクセスできるようにすることです。"},
 {id:57,imp:2,q:"Microsoft Entra ID から組織のオンプレミスのデータセンターで実行されている Web アプリケーションに、ユーザー サインオン トークンを安全に渡すために連携するサービスとコネクタはどれですか？",o:["アプリケーション プロキシ コネクタと Azure Firewall サービス","Microsoft Entra Private Access と ExpressRoute","Microsoft Entra アプリケーション プロキシ サービスとアプリケーション プロキシ コネクタ","Microsoft Entra アプリケーション プロキシ サービスと Application Gateway"],a:2,e:"オンプレミスの Web アプリケーションへの安全なリモート アクセスを提供するためには、アプリケーション プロキシ サービスと、オンプレミスにインストールする軽量なアプリケーション プロキシ コネクタを使用します。"},
 {id:58,imp:3,c:[0,1,2],q:"Microsoft Entra 条件付きアクセス ポリシーにおいて、アクセスを決定するために分析される「シグナル」として一般的に使用されるものをすべて選択してください。",o:["ユーザーまたはグループのメンバーシップ","デバイスのプラットフォームとコンプライアンス状態","IP アドレスまたは場所","データベースの暗号化状態"],e:"条件付きアクセスは、ユーザー情報、場所 (IP アドレス)、デバイスの状態、クライアント アプリケーション、およびリスクなどのシグナルを分析して、アクセスの許可やブロックをリアルタイムで決定します。データベースの状態は評価しません。"},
 {id:59,imp:4,q:"Microsoft Entra B2B は、2 つのプロトコルのいずれかを使用する ID プロバイダーとフェデレーションするように構成できます。1 つは SAML（Security Assertion Markup Language）ですが、もう 1 つは何ですか？",o:["LDAP","WS-Federation (WS-Fed)","RADIUS","NTLM"],a:1,e:"外部 ID プロバイダー（IdP）との直接フェデレーションでは、SAML プロトコルまたは WS-Federation (WS-Fed) プロトコルがサポートされています。"},
 {id:60,imp:1,q:"エンタイトルメント管理の「アクセス パッケージ」とは何ですか？",o:["ユーザーがプロジェクトの作業をしたりタスクを遂行したりするために必要となるすべてのリソースと、そのアクセス権をバンドルしたもの。","デバイスを組織に参加させるための登録ファイル。","B2B 組織間に推移的な信頼を作成するために使用されるプロトコル。","自動的にゲストユーザーを削除するスクリプトのセット。"],a:0,e:"アクセス パッケージは、グループ、アプリケーション、SharePoint サイトなどのリソースへのアクセス権をひとまとめにし、ライフサイクル全体（申請から有効期限切れまで）を管理しやすくする機能です。"},
 {id:61,imp:5,q:"デプロイ、保守、インフラストラクチャに関して、最小限の労力で導入できるオンプレミス同期の認証方法はどれですか？",o:["パススルー認証 (PTA)","Active Directory フェデレーション サービス (AD FS)","パスワード ハッシュの同期 (PHS)","LDAP バインド"],a:2,e:"パスワード ハッシュ同期 (PHS) は、パスワードのハッシュをクラウドに同期してクラウド側で認証を行うため、追加のオンプレミス認証インフラストラクチャ（AD FS や PTA エージェントなど）を維持する必要がなく、最も簡単に導入できます。"},
 {id:62,imp:2,q:"職場または学校関連のアプリの機密データを保護するために、デバイスをモバイル デバイス管理 (MDM) に登録せずにモバイル アプリケーション管理 (MAM) を使用するのは、一般的にどのようなシナリオですか？",o:["継続的アクセス評価の適用","BYOD (Bring-Your-Own-Device) のシナリオ","スマート ロックアウト ポリシーの構成","オンプレミスのパスワード リセット"],a:1,e:"従業員の個人デバイス（BYOD）からアクセスする場合、デバイス全体を企業が管理（登録）するのではなく、条件付きアクセスのアプリ保護ポリシーを使用して、アプリレベルで企業データを分離・保護します。"},
 {id:63,imp:4,q:"Azure リソースのロールの割り当てにおいて、Privileged Identity Management (PIM) などを利用して定期的に「アクセス レビュー」を行う主な理由の 1 つは何ですか？",o:["名前付け規則が正しく適用されていることを確認するため。","古くなったロールの割り当てに関連するリスクを軽減するため。","使用されなくなった余分な配布グループを削除するため。","ライセンスのコストを削減するため。"],a:1,e:"アクセス レビューの主な目的は、ユーザーが現在もその特権ロールやアクセス権を必要としているかを定期的に確認し、不要になった権限を取り除くことでセキュリティリスク（特権のクリープ）を軽減することです。"},
 {id:64,imp:1,q:"Microsoft Entra ID の使用状況と分析情報のレポートには、主にどのような情報が含まれますか？",o:["最も使用されているアプリケーション、サインインが最も失敗するアプリケーション、および各アプリケーションで最も頻繁に発生するサインイン エラー","サインイン ログの最大保持期間とストレージのクォータ","ファイアウォールを通過したすべてのトラフィックのパケット サイズ","Privileged Identity Management のアクティブ化の承認者リスト"],a:0,e:"使用状況と分析情報レポートは、組織内でどのアプリケーションが頻繁に使用されているか、どこでサインイン エラーが多発しているかなど、アプリの利用状況に焦点を当てた情報を提供します。"},
 {id:65,imp:5,q:"Azure portal を使用して、アプリケーションの「アプリ ロール」を宣言する 2 つの方法は何ですか？",o:["アプリ ロールの UI とアプリ マニフェスト エディターを使用する。","証明書とシークレットを使用する。","トークン構成と API のアクセス許可を使用する。","エンタープライズ アプリケーションのプロパティを編集する。"],a:0,e:"アプリ ロール（カスタムの権限設定）は、Azure portal の「アプリ ロール」メニュー（UI）を使用するか、「アプリ マニフェスト」の JSON を直接編集することで作成・宣言できます。"},
 {id:66,imp:2,q:"「ゼロ トラスト」アーキテクチャの基本となる 3 つの原則（テナント）は何ですか？",o:["明示的に確認する - 最小特権 - 条件付きアクセス","多要素認証 - 条件付きアクセス - 特権 ID 管理","ネットワーク境界を保護する - 継続的評価 - デバイスの登録","明示的に確認する - 最小特権 - 侵害を想定する"],a:3,e:"ゼロ トラスト セキュリティ モデルは、「明示的に確認する（Verify explicitly）」「最小特権の原則を使用する（Use least privilege access）」「侵害を想定する（Assume breach）」の 3 つのコア原則に基づいています。"},
 {id:67,imp:1,q:"Azure portal からゲスト ユーザーを一括招待する際にダウンロードする CSV テンプレートについて、正しい説明はどれですか？",o:["テンプレートの最初の 2 行は、システムの処理に必要であるため削除したり変更したりしてはならない。","カスタム属性を追加するために、新しい列を自由に作成することが推奨される。","招待するユーザーのパスワードを必須項目として入力する必要がある。","CSV ファイルは 1 回のアップロードで最大 50,000 行まで対応している。"],a:0,e:"一括招待用の CSV テンプレートは、最初の 2 行を変更または削除すると処理ができなくなります。また、列の追加も無視されるため推奨されません。"},
 {id:68,imp:2,q:"Microsoft Entra Identity Protection において、「匿名 IP アドレス」や「マルウェアにリンクされた IP アドレス」からのアクセスを評価するのはどちらのリスクですか？",o:["ユーザー リスク","サインイン リスク","デバイス リスク","コンプライアンス リスク"],a:1,e:"サインインの瞬間に認証要求と一緒に評価されるリスク（匿名IP、非定型的な移動など）は「サインイン リスク」として分類されます。"},
 {id:69,imp:3,c:[1,3],q:"セルフサービス パスワード リセット (SSPR) の設定において、ユーザーがパスワードをリセットするための認証方法として利用可能なものをすべて選択してください。",o:["FIDO2 セキュリティ キー","電子メール","Windows Hello for Business","セキュリティの質問"],e:"電子メール アドレスとセキュリティの質問は SSPR の認証方法として利用できます。FIDO2 と Windows Hello for Business はパスワードレス認証の手段であり、SSPR のリセット手段には含まれません。"},
 {id:70,imp:4,q:"Microsoft Defender for Identity (MDI) の主な目的は何ですか？",o:["クラウド上の SaaS アプリケーションの利用状況を可視化し、シャドウ IT を発見する。","オンプレミスの Active Directory ドメイン コントローラーに対するサイバー攻撃や内部の脅威を識別し、調査する。","Azure リソースのネットワーク トラフィックをファイアウォールで保護する。","ユーザーのデバイスにインストールされたマルウェアを検出する。"],a:1,e:"Microsoft Defender for Identity は、オンプレミスの Active Directory 信号を使用して、組織に向けられた高度な脅威や悪意のある内部者によるアクションを特定・調査するソリューションです。"},
 {id:71,imp:5,q:"Microsoft Entra Connect Health が組織に提供する機能として正しいものはどれですか？",o:["Microsoft 365 ライセンスの割り当てをユーザーの属性に基づいて自動化する。","オンプレミスの ID インフラストラクチャ (AD DS, AD FS, Azure AD Connect など) の正常性とパフォーマンスを監視し、アラートを提供する。","Azure サブスクリプションの課金情報を管理する。","ゲストユーザーの招待プロセスを自動的に承認する。"],a:1,e:"Connect Health は、オンプレミスの ID 基盤（AD DS や AD FS サーバーなど）の稼働状況をクラウドから監視し、同期エラーやパフォーマンスの問題に対する分析情報を提供します。"},
 {id:72,imp:2,q:"Microsoft Entra ID にカスタム ドメイン (例: contoso.com) を追加して使用する前に、ドメインの所有権を証明するためにドメイン レジストラー (DNS) に追加する必要があるレコードの種類はどれですか？",o:["A レコード または AAAA レコード","CNAME レコード","TXT レコード または MX レコード","SRV レコード"],a:2,e:"カスタム ドメインを検証するには、Microsoft Entra ID で生成された情報を使用して、DNS に TXT レコードまたは MX レコードを作成する必要があります。"},
 {id:73,imp:3,c:[0,1,2],q:"Microsoft Entra でアクセス レビューを作成する際、レビュー担当者（レビュアー）として構成できる設定オプションをすべて選択してください。",o:["レビュー対象のグループの所有者","個別に選択した特定のユーザー または グループ","ユーザー自身 (自己レビュー)","Microsoft アカウント (MSA) を持つ任意のインターネット ユーザー"],e:"アクセス レビューでは、指定されたユーザー/グループ、グループの所有者、またはユーザー自身が自分のアクセス権をレビューする（自己レビュー）ように設定できます。"},
 {id:74,imp:1,q:"Microsoft Entra ID の監査ログやサインイン ログの既定の保持期間は限られています。ログを長期間保存したり、サードパーティの SIEM と統合したりするために、ログをルーティングできる宛先はどれですか？",o:["Azure SQL Database","Azure Log Analytics ワークスペース (Azure Monitor)","Azure Content Delivery Network (CDN)","Azure Key Vault"],a:1,e:"監査ログとサインイン ログは、Azure Monitor の機能である Log Analytics ワークスペース、Event Hubs、または Azure ストレージ アカウントにルーティングして長期保存や分析を行うことができます。"},
 {id:75,imp:4,q:"マルチテナント アプリケーションを構築する際のベスト プラクティスとして推奨されているアプローチはどれですか？",o:["将来的に必要になる可能性を考慮して、できるだけ多くのアクセス許可をあらかじめ要求しておく。","最小特権の原則に従い、アプリが機能するために実際に必要とするアクセス許可のみを要求する。","テナント間でユーザー パスワードを共有するデータベースを構築する。","クライアント シークレットを使用せず、アプリケーション内にハードコードされたパスワードを埋め込む。"],a:1,e:"マルチテナント アプリでは、過剰な権限要求がブロックや承認拒否の原因となるため、最小特権の原則に従って必要なアクセス許可のみを要求することがベストプラクティスです。"},
 {id:76,imp:3,c:[0,2],q:"Microsoft Entra ID の「ブック (Workbooks)」機能を利用して、サインイン データなどを視覚化および分析するために、前提条件として構成が必要なコンポーネントをすべて選択してください。",o:["Azure Log Analytics ワークスペース","Azure Data Factory","ログをワークスペースにルーティングするための診断設定","Azure ExpressRoute"],e:"ブック（Workbooks）でデータを視覚化するには、基となるデータソースが必要です。そのため、Log Analytics ワークスペースを作成し、Entra ID の診断設定からログをそのワークスペースに送信する構成が前提となります。"},
 {id:77,imp:2,q:"Microsoft Entra パススルー認証 (PTA) を使用する場合、ユーザーのパスワードが「正しいかどうか」の検証はどこで実行されますか？",o:["クラウドの Microsoft Entra ID データベース","オンプレミスの Active Directory ドメイン コントローラー","ユーザーのローカル デバイス","Microsoft Defender for Cloud Apps"],a:1,e:"パススルー認証 (PTA) では、クラウドにパスワード ハッシュを保存せず、オンプレミスのサーバーにインストールされた軽量エージェントを通じて、オンプレミスの Active Directory ドメイン コントローラーで直接パスワードを検証します。"},
 {id:78,imp:5,q:"B2B コラボレーションで招待されたゲスト ユーザー (外部ユーザー) のプロファイル情報に関する説明として、一般的な特徴はどれですか？",o:["ゲスト ユーザーの UserPrincipalName (UPN) には、通常 #EXT# という文字列が含まれる。","ゲスト ユーザーは、招待されたテナントのグローバル 管理者ロールに自動的に割り当てられる。","ゲスト ユーザーのパスワードは、ホスト側のテナントのポリシーによって 30 日ごとにリセットが強制される。","ゲスト ユーザーは、常にホスト テナントの Microsoft 365 ライセンスを自動的に消費する。"],a:0,e:"B2B ゲスト ユーザーとしてディレクトリに作成されたアカウントの UPN は、通常 ユーザー名_ドメイン#EXT#@テナント名.onmicrosoft.com の形式になります。パスワード管理はゲストのホーム テナント側で行われます。"},
 {id:79,imp:3,c:[0,1],q:"Microsoft Entra の「管理単位 (Administrative Units)」に含めることができるディレクトリ オブジェクトの種類をすべて選択してください。",o:["ユーザー","グループ","Azure サブスクリプション","Azure 仮想マシン"],e:"管理単位は Microsoft Entra ID 内の論理的なコンテナーであり、ユーザー、グループ、またはデバイスのみを含めることができます。Azure リソース（サブスクリプションやVMなど）は対象外です。"},
 {id:80,imp:4,q:"Privileged Identity Management (PIM) を使用している環境において、テナントの外部で (PIM のシステムをバイパスして) 特権ロールが直接ユーザーに割り当てられた場合、PIM はどのような対応をしますか？",o:["そのユーザー アカウントを即座にロックアウトする。","セキュリティ リスクとして「テナント外でロールが割り当てられています」というアラートを生成する。","バイパスされたロールの割り当てを自動的に取り消す。","ポリシー違反としてそのユーザーをディレクトリから削除する。"],a:1,e:"PIM は定期的にロールの割り当てをスキャンし、PIM インターフェイスを経由せずにロールが割り当てられたことを検出すると、管理者に警告するアラートを生成します。"},
 {id:81,imp:1,q:"条件付きアクセス ポリシーの「レポート専用 (Report-only)」モードを使用する主な利点は何ですか？",o:["ポリシーの条件を満たしたユーザーへのアクセスを直ちにブロックする。","ユーザーに影響（アクセス ブロックや MFA の要求など）を与えることなく、ポリシーの適用結果を事前にシミュレーション・評価する。","レポート専用モードのポリシーは、管理者にのみ適用される。","レポートをエクスポートして課金データを表示する。"],a:1,e:"レポート専用モードを使用すると、実際のアクセスをブロックしたり MFA を要求したりすることなく、サインイン ログを通じてそのポリシーが有効になった場合にユーザーにどのような影響があるかを安全に評価できます。"},
 {id:82,imp:2,q:"エンタイトルメント管理において、関連付けられたリソース（グループ、アプリケーション、SharePoint サイトなど）と、それらをまとめた「アクセス パッケージ」を格納するための論理的なコンテナーとして機能するものは何ですか？",o:["アクセス レビュー","カタログ (Catalog)","管理単位 (Administrative Unit)","セキュリティ グループ"],a:1,e:"カタログは、関連するリソースとアクセス パッケージをひとまとめにするコンテナーです。管理者はカタログごとに権限を委任し、リソースの管理を分割できます。"},
 {id:83,imp:4,q:"機密性の高い特定の SharePoint サイトにアクセスする時だけ、追加の MFA や使用条件の同意をユーザーに要求したいと考えています。これを実現するために、個別のアプリケーション全体ではなく、特定のサイトやアクションと「条件付きアクセス ポリシー」を紐づける機能はどれですか？",o:["継続的アクセス評価 (CAE)","セッションのリスク スコア","認証コンテキスト (Authentication context)","カスタム セキュリティ属性"],a:2,e:"認証コンテキストを使用すると、アプリ全体ではなく、アプリ内の特定のデータやアクション（保護されたSharePointサイトなど）に対して、条件付きアクセス ポリシーをターゲットに設定できます。"},
 {id:84,imp:3,c:[0,1,3],q:"Azure portal における「アプリの登録 (App registrations)」と「エンタープライズ アプリケーション (Enterprise applications)」の違いについて、正しい説明をすべて選択してください。",o:["「アプリの登録」は、アプリケーションのグローバルな定義（アプリケーション オブジェクト）を管理するために使用される。","「エンタープライズ アプリケーション」は、特定のテナント内でのアプリのローカル インスタンス（サービス プリンシパル）を管理するために使用される。","カスタムの「アプリ ロール」は、「エンタープライズ アプリケーション」の画面からのみ作成できる。","ユーザーへのアプリの割り当てやプロビジョニング、SAML SSO の設定は、主に「エンタープライズ アプリケーション」で行う。"],e:"アプリ ロールの宣言・作成は「アプリの登録」のマニフェストまたはUIから行います。それ以外は正しい説明です。"},
 {id:85,imp:5,q:"オンプレミスの Web アプリケーションを Microsoft Entra アプリケーション プロキシで公開し、事前認証後にオンプレミス アプリへ自動サインインさせる「Kerberos の制約付き委任 (KCD)」を構成しました。この構成を機能させるための、コネクタ サーバーの重要な前提条件は何ですか？",o:["コネクタ サーバーに Microsoft SQL Server がインストールされていること。","コネクタ サーバーがインターネットに直接公開されている (パブリック IP を持つ) こと。","コネクタ サーバーがオンプレミスの Active Directory ドメインに参加していること。","コネクタ サーバーが Azure VPN ゲートウェイとして構成されていること。"],a:2,e:"KCD（Kerberos の制約付き委任）を使用して SSO を実行するには、アプリケーション プロキシ コネクタ サーバーが、ユーザーとアプリケーションが存在するオンプレミスの Active Directory ドメインに参加している必要があります。"},
 {id:86,imp:1,q:"Microsoft Entra ID で FIDO2 セキュリティ キーを使用したパスワードレス認証を構成する際、ユーザーが自分自身のセキュリティキーを登録するための前提条件となるものは何ですか？",o:["グローバル セキュア アクセス クライアントがインストールされていること。","事前に多要素認証 (MFA) の登録を少なくとも 1 つ完了していること。","デバイスがオンプレミスのドメインにのみ参加していること。","テナントのセキュリティの既定値群が無効であること。"],a:1,e:"セキュリティ キーを登録してアカウントに関連付けるには、ユーザーが事前に Microsoft Authenticator アプリなどの他の MFA 登録を完了し、多要素認証を実行できる状態である必要があります。"},
 {id:87,imp:3,c:[0,1],q:"ハイブリッド ID 環境で「パスワード ハッシュ同期 (PHS)」ではなく、あえて「パススルー認証 (PTA)」を選択する固有の理由として、該当するものをすべて選択してください。",o:["クラウドにパスワード ハッシュのコピーを一切保存したくないという厳格なセキュリティ要件があるため。","オンプレミスの Active Directory に設定されているパスワード ポリシー (サインイン時間の制限など) をクラウドでのサインイン時にも即座に適用したいため。","追加のオンプレミス エージェントを展開・管理するインフラの負担を完全になくしたいため。","Microsoft Entra ID Protection の「漏洩した資格情報の検出」機能を活用したいため。"],e:"PTA はオンプレミスの AD で直接パスワードを検証するため、ハッシュをクラウドに保存せず、オンプレミスの制限（時間帯制限など）を即座に適用できます。一方、エージェントの展開が必要であり、「漏洩した資格情報の検出」を活用するには PHS も併用する必要があります。"},
 {id:88,imp:4,q:"マルチクラウド環境 (Azure、AWS、GCP) において「エンタイトルメント クリープ (過剰な権限の蓄積)」のリスクを管理・軽減する、Microsoft Entra 権限管理 (Permissions Management) 。このツールがアクセス許可のリスクを評価するために算出する指標は何と呼ばれますか？",o:["ユーザー リスク スコア","PCI (Permission Creep Index : アクセス許可のクリープ インデックス)","アイデンティティ セキュリティ スコア","特権アクセス モニター スコア"],a:1,e:"PCI は、付与されているアクセス許可の量と、実際に使用されているアクセス許可の量のギャップを評価し、リスク レベルを数値化した指標です。"},
 {id:89,imp:2,q:"外部テナントとの B2B コラボレーションにおいて、「テナント間のアクセス設定」を構成しています。外部のパートナー テナント側で既に MFA を実行したユーザーに対し、自社のテナントで再度 MFA を要求しないようにするには、どの設定を構成しますか？",o:["B2B 直接接続 (Direct connect)","アウトバウンドのアクセス設定ですべてのユーザーをブロックする","インバウンドの信頼設定 (Inbound trust settings) で「パートナー テナントの MFA を信頼する」を有効にする","セキュリティの既定値群を無効にする"],a:2,e:"インバウンドの信頼設定で他のテナントの MFA を信頼するように設定すると、パートナーのユーザーは自テナントで MFA を完了していれば、リソースにアクセスする際に再度の MFA を求められなくなります。"},
 {id:90,imp:5,q:"「Microsoft Entra アプリケーション プロキシ」と「Microsoft Entra Private Access」はどちらもプライベート リソースへのアクセスを提供しますが、Private Access 特有の機能的利点はどれですか？",o:["Web アプリケーション (HTTP/HTTPS) のみのアクセスをサポートしている。","アプリケーション コードを変更することなく、TCP および UDP ベースのすべてのプライベート アプリ (RDP、SMB、SSH など) へのアクセスをサポートする。","オンプレミス ネットワーク内にコネクタを展開する必要が一切ない。","認証に Kerberos 制約付き委任 (KCD) を排他的に使用する。"],a:1,e:"アプリケーション プロキシが主に Web アプリ (HTTP/HTTPS) 向けであるのに対し、Private Access は Web アプリに限らず、すべての TCP/UDP ベースのアプリケーションに対するセキュアなアクセスを、VPN なしで提供します。"},
 {id:91,imp:3,c:[0,1,2],q:"Microsoft Entra 条件付きアクセス ポリシーの「条件 (Conditions)」として評価に利用できる要素をすべて選択してください。",o:["ユーザーが属する特定のディレクトリ ロール","サインインしているデバイスのプラットフォーム (iOS、Android、Windows など)","アクセスに使用しているクライアント アプリ (ブラウザー、先進認証クライアントなど)","パスワードの有効期限が切れるまでの日数"],e:"ユーザー/ロールのメンバーシップ、デバイス プラットフォーム、クライアント アプリケーション、場所、リスクなどはポリシーの「条件」として使用できます。パスワードの有効期限は条件付きアクセスのシグナルには含まれません。"},
 {id:92,imp:1,q:"Microsoft Entra Verified ID は分散型 ID に基づいています。検証済みの資格情報 (例えば大学の卒業証明書など) は、システム上どこに保存・保持されますか？",o:["大学のオンプレミス Active Directory","Microsoft Entra ID のクラウド データベース","ユーザー自身のデバイス上のデジタル ウォレット (Microsoft Authenticator アプリなど)","Azure Key Vault"],a:2,e:"分散型 ID では、ID 情報のコントロールをユーザー自身が持ちます。検証済みの資格情報は、ユーザーのデジタル ウォレット アプリ（Microsoft Authenticatorなど）に保存され、ユーザーが提示先を決定します。"},
 {id:93,imp:4,q:"Azure 仮想マシン (VM) 上のアプリが、資格情報をコード内に持たずに Azure Key Vault からシークレットを取得します。このとき、VM リソースのライフサイクルに直接関連付けられ、VM が削除されると自動的に Microsoft Entra ID からも削除される ID はどれですか？",o:["サービス プリンシパル (手動で作成)","ユーザー割り当てマネージド ID","システム割り当てマネージド ID","アプリケーション プロキシ エージェント"],a:2,e:"システム割り当てマネージド ID は、特定のリソース（この場合は VM）上で直接有効にされ、そのリソースのライフサイクルを共有します。リソースが削除されると ID もクリーンアップされます。"},
 {id:94,imp:3,c:[0,1,3],q:"アプリの登録における「API のアクセス許可」について、正しい説明をすべて選択してください。",o:["「委任されたアクセス許可 (Delegated)」は、サインインしているユーザーの代理としてアプリが API にアクセスする場合に使用される。","「アプリケーションの許可 (Application)」は、バックグラウンド サービスやデーモンなど、サインインしているユーザーが存在しない場合に使用される。","「委任されたアクセス許可」は、リクエストする際に常にテナント管理者の同意を必要とする。","「アプリケーションの許可」は、強力な権限であるため、一般的にテナント管理者の同意が必要である。"],e:"委任されたアクセス許可は、常に管理者の同意が必要なわけではなく、権限の内容によっては一般ユーザーが自身で同意できる場合もあります（管理者の同意が必要な権限もあります）。"},
 {id:95,imp:2,q:"Microsoft Entra の「ID セキュリティ スコア (Identity Secure Score)」の主な目的は何ですか？",o:["各ユーザーのパスワードの複雑さを採点し、ランキングを作成する。","マルウェアの検出数とブロック数をスコア化する。","ライセンスの消費状況を計算し、コスト削減の提案を行う。","推奨されるセキュリティ ベスト プラクティス（MFA の有効化など）を組織がどの程度実装しているかを数値化し、態勢の改善を支援する。"],a:3,e:"ID セキュリティ スコアは、Microsoft の推奨するセキュリティ対策と組織の現状を比較・数値化し、セキュリティ態勢を改善するための具体的なアクションを提供します。"},
 {id:96,imp:5,q:"Microsoft Entra アクセス レビューで、レビュー対象者が期間内に応答しなかった（未レビューの）場合、システムが自動的に実行できる「完了時の設定 (フォールバック アクション)」として設定できないものはどれですか？",o:["アクセス権を削除する (Remove access)","アクセス権を承認する (Approve access)","ユーザーのアカウントをディレクトリから完全に削除する (Delete user account completely)","システムの推奨事項を採用する (Take recommendations)"],a:2,e:"アクセス レビューのフォールバック アクションとして「アクセス権の承認」「アクセス権の削除」「推奨事項の採用」「変更なし」を選択できますが、ユーザーアカウントそのものを自動的に削除する機能はここにはありません。"},
 {id:97,imp:1,q:"Azure Key Vault に格納されているシークレットを読み取る（シークレットの内容を取得する）ために、ユーザーまたはアプリケーションに対して割り当てる必要のある組み込みの Azure ロールはどれですか？",o:["Key Vault 共同作成者","Key Vault シークレット ユーザー","Key Vault 管理者","閲覧者"],a:1,e:"Key Vault 内のシークレットデータそのものを読み取るデータプレーンの操作には、「Key Vault シークレット ユーザー」ロールが必要です。共同作成者や閲覧者は管理プレーンのロールであり、シークレット自体は読み取れません。"},
 {id:98,imp:2,q:"組織固有の要件を満たすためにカスタムの Azure ロールを作成する場合、そのロールを割り当て可能なスコープ（AssignableScopes）として指定できないものはどれですか？",o:["管理グループ","サブスクリプション","リソース グループ","Microsoft Entra テナント全体"],a:3,e:"Azure ロール（Azure RBAC）のスコープはリソースを管理する階層であり、管理グループ、サブスクリプション、リソース グループ、特定のリソースを指定します。Microsoft Entra テナント全体は Azure ロールのスコープではありません。"},
 {id:99,imp:3,c:[0,3],q:"Microsoft Defender for Cloud Apps の「アプリ ガバナンス」機能、または OAuth アプリ ポリシーを使用して、異常な動作をしている OAuth アプリケーションに対して自動的に適用できるガバナンス アクションを選択してください。",o:["アプリの無効化（Revoke app）","アプリのソースコードの削除","ユーザーのパスワード リセットの強制","アプリのアクセス許可の取り消し（Revoke permissions）"],e:"OAuth アプリ ポリシーでは、悪意のあるアプリやポリシー違反のアプリの承認を取り消す（アプリの無効化）、または特定のアクセス許可を取り消すなどの自動ガバナンス アクションを実行して保護します。"},
 {id:100,imp:4,q:"組織の「緊急アクセス アカウント（Break-glass account）」を構成する際のベスト プラクティスに該当するものはどれですか？",o:["アカウントのパスワードは個人のスマートフォンに保存し、多要素認証 (MFA) を要求する。","このアカウントを、MFA を要求するすべての条件付きアクセス ポリシーの「除外`」に設定する。","アカウントはオンプレミスの Active Directory から同期し、同じパスワードを使用する。","少なくとも 5 つ以上の緊急アクセス アカウントを作成する。"],a:1,e:"緊急アクセス アカウントは、MFA サービスの中断時などにも確実にテナントにサインインして復旧作業を行えるよう、MFA などを要求する条件付きアクセス ポリシーから意図的に除外する必要があります。アカウントはクラウド専用で通常 2 つ作成することが推奨されます。"},
 {id:101,imp:5,q:"Privileged Identity Management (PIM) for Groups（旧：特権アクセス グループ）機能を使用する主な利点は何ですか？",o:["グループのメンバーのパスワードを定期的に自動リセットできる。","ゲストユーザーに対してのみ、グループへの永続的なアクセス権を自動付与できる。","1 回のアクティブ化リクエストで、ユーザーに複数の Microsoft Entra ロールと Azure ロールを同時に付与できる。","Azure サブスクリプションの課金をグループ単位で分割できる。"],a:2,e:"PIM for Groups を使用すると、ロール割り当て可能なグループのメンバーシップを PIM でアクティブ化できるため、あらかじめ複数のロールを割り当てたグループを使うことで、ユーザーは一度に複数のアクセス許可を得ることができます。"},
 {id:102,imp:1,q:"Microsoft Entra の「B2B 直接接続 (Direct connect)」を利用して Teams の共有チャネルで外部組織とコラボレーションを行う場合、B2B コラボレーション（ゲスト招待）と比較した時の最大の特徴は何ですか？",o:["外部ユーザーを自テナントのゲストとしてディレクトリに追加（招待）する必要がない。","外部ユーザーのパスワードを自テナントの管理者が管理できる。","Microsoft Entra Premium P2 ライセンスがすべてのユーザーに必須となる。","共有チャネル内ではファイルの共有が完全に禁止される。"],a:0,e:"B2B 直接接続では、相互のテナントで信頼設定を行うことで、外部ユーザーを自テナントのディレクトリにゲストアカウントとして作成することなく、シームレスに Teams 共有チャネルなどで共同作業ができます。"},
 {id:103,imp:2,q:"Microsoft Entra ID の「スマート ロックアウト」機能は、パスワード推測攻撃から組織を保護します。この機能における「スマート」な要素とは何を指していますか？",o:["1 回でもパスワードを間違えると即座にアカウントをロックする。","ユーザーが使い慣れた場所からのサインインと、攻撃者による不明な場所からのサインインを区別し、攻撃者のみをロックアウトする。","スマートフォンからのサインイン試行のみをブロックする。","パスワードの代わりに必ず指紋認証を要求するように変更する。"],a:1,e:"スマート ロックアウトは、サインインの場所などのシグナルを分析し、正規のユーザーと攻撃者を区別します。これにより、正規ユーザーのアクセスは許可しつつ、攻撃者の試行回数をカウントしてロックアウトします。"},
 {id:104,imp:3,c:[0,2],q:"「マイ アプリ (My Apps)」ポータルで「アプリケーション コレクション」を作成する目的として適切なものを選択してください。",o:["ユーザーが利用できる多数のアプリを、役割や部門ごとに論理的なタブにグループ化して見やすくする。","サードパーティ アプリのソース コードをポータル上で直接編集する。","特定のアプリ コレクションを、特定のユーザーやグループにのみ表示されるようにターゲット設定する。","ユーザーがマイ アプリ ポータルからオンプレミス サーバーを直接再起動できるようにする。"],e:"アプリケーション コレクションは、マイ アプリ ポータル上でアプリをタブ（コレクション）に整理し、ユーザーの役割やグループに応じて必要なタブだけを表示するようにカスタマイズするために使用されます。"},
 {id:105,imp:4,q:"組織の「カスタムの禁止パスワード」リストを構成する際、推測されやすいパスワードを防ぐために登録する文字列として、Microsoft が推奨していないアプローチはどれですか？",o:["組織のブランド名や製品名を含める。","地域のランドマークや本社の所在地の名前を含める。","「Password123」のような世界中で一般的に使用される数百万の脆弱なパスワードを手動で 1 つずつリストに登録する。","社内で一般的に使用される特定のプロジェクト名を含める。"],a:2,e:"一般的に脆弱なパスワードは Microsoft が管理する「グローバルな禁止パスワード リスト」によって自動的にブロックされます。カスタム リストには、グローバル リストではカバーできない、組織固有の用語（ブランド名、地域名など）のみを登録すべきです。"},
 {id:106,imp:5,q:"Microsoft Entra ID からサードパーティの SaaS アミュニケーション（ServiceNow など）への「自動ユーザー プロビジョニング」を実装するために、業界標準として一般的に使用されるプロトコルは何ですか？",o:["SAML 2.0","SCIM (System for Cross-domain Identity Management) 2.0","OAuth 2.0","WS-Federation"],a:1,e:"Microsoft Entra ID は、ID ドメイン間管理システム (SCIM) 2.0 標準プロトコルをサポートするアプリケーションに対し、ユーザーやグループの作成・更新・削除のライフサイクルを自動化（プロビジョニング）できます。"},
 {id:107,imp:1,q:"組織の管理者に「ユーザーのパスワード リセット」や「新しいユーザー アカウントの作成」の権限を付与したい場合、どのカテゴリのロールを割り当てるべきですか？",o:["Azure ロール (例: 仮想マシン共同作成者)","Microsoft Entra ID ロール (例: ユーザー管理者)","アプリ ロール (例: アプリケーション固有の管理者)","サブスクリプション所有者"],a:1,e:"ユーザーの作成やパスワードのリセットといったディレクトリ リソースに関わる操作は、Microsoft Entra ID ロール（ユーザー管理者やヘルプデスク管理者など）の管轄となります。"},
 {id:108,imp:2,q:"サードパーティのアプリケーションが、組織内のユーザー データにアクセスするための許可を要求しています。個々のユーザーに同意プロンプトを表示させるのではなく、管理者が組織全体を代表して一度に同意を付与する操作を何と呼びますか？",o:["テナント全体の管理者の同意 (Tenant-wide admin consent)","アプリケーション プロキシの事前認証","クロステナント アクセス ポリシーの承認","自己サービス アプリのプロビジョニング"],a:0,e:"管理者が「テナント全体の管理者の同意」を付与すると、そのアプリに対して組織内のすべてのユーザーの代わりとして許可が与えられ、エンド ユーザーには同意プロンプトが表示されなくなります。"},
 {id:109,imp:3,c:[0,1,3],q:"アプリケーション オブジェクト（アプリの登録）とサービス プリンシパル（エンタープライズ アプリケーション）の関係について、正しい説明を選択してください。",o:["アプリケーション オブジェクトは、アプリケーションの「グローバルな定義」である。","サービス プリンシパルは、特定のテナント内におけるアプリケーションの「ローカルなインスタンス」である。","アプリケーション オブジェクトを削除しても、関連するサービス プリンシパルは影響を受けない。","1 つのアプリケーション オブジェクトに対して、複数の異なるテナントにそれぞれサービス プリンシパルを作成することができる。"],e:"アプリケーション オブジェクトはグローバルな設計図であり、サービス プリンシパルは各テナントでの実体（インスタンス）です。マルチテナント アプリでは複数のテナントにサービス プリンシパルが存在します。アプリ オブジェクトを削除すると、原則として関連するサービス プリンシパルも機能しなくなります。"},
 {id:110,imp:4,q:"ユーザーがクラウド アプリにサインインした際、ブラウザーを閉じて再起動してもサインイン状態を維持し、再度の認証プロンプトを非表示にするための条件付きアクセス ポリシーのセッション制御はどれですか？",o:["アプリによって適用される制限","永続的なブラウザー セッション (Persistent browser session)","条件付きアクセス アプリ制御","サインインの頻度"],a:1,e:"「永続的なブラウザー セッション」を有効にすると、セッション Cookie が永続化され、ユーザーがブラウザー ウィンドウを閉じて再度開いた後でもサインインした状態を維持できます。"},
 {id:111,imp:5,q:"アクセス レビューが完了した後に、レビュー担当者（レビュアー）によって「拒否」されたユーザーのアクセス権を、管理者が手動で削除しなくても済むようにするための設定オプションはどれですか？",o:["リソースへの結果の自動適用 (Auto-apply results to resource)","結果のエクスポート","レビューのスケジュール設定","システム推奨事項の無効化"],a:0,e:"アクセス レビューの構成で「結果をリソースに自動適用する」を有効にすると、レビュー期間の終了時に、拒否されたユーザーのアクセス権（グループ メンバーシップやロールなど）がシステムによって自動的に削除されます。"},
 {id:112,imp:1,q:"Microsoft Entra ID で、組織のすべてのユーザーを含める「動的グループ」を作成する場合に使用するルール構文として正しいものはどれですか？",o:["user.objectId -ne null","user.userType -eq 'All'","user.department -contains '*'","user.accountEnabled -eq true"],a:0,e:"すべてのユーザーを動的グループに含めるための標準的な式は user.objectId -ne null です。これにより、B2B ゲスト ユーザーとメンバー ユーザーの両方が含まれます。"},
 {id:113,imp:2,q:"アクセス レビューのプロセスにおいて、レビューが開始され「レビュー担当者が期限までに決定を送信できる状態」を示すステータスはどれですか？",o:["適用中 (Applying)","自動レビュー中 (AutoReviewing)","進行中 (InProgress)","完了処理中 (Completing)"],a:2,e:"「進行中 (InProgress)」ステータスは、レビューが開始され、担当者が決定を送信できるアクティブな状態を示します。"},
 {id:114,imp:3,c:[0,2],q:"アプリケーションの「アプリ ロール（スコープ）」を作成し、「同意できるユーザー（Who can consent）」を設定する場合のオプションとして正しいものをすべて選択してください。",o:["管理者とユーザー (Admins and users)","グローバル管理者のみ (Global administrators only)","管理者のみ (Admins only)","アプリケーション所有者のみ (Application owners only)"],e:"アプリ ロールの同意オプションには、より高い特権を要する「管理者のみ」と、一般ユーザーも同意可能な「管理者とユーザー」の2つが用意されています。"},
 {id:115,imp:4,q:"Microsoft Entra ID の既定 of アクセス許可において、「メンバー ユーザー」には許可されているが、「ゲスト ユーザー」には制限されている（または許可されていない）アクションはどれですか？",o:["自分のプロパティを読み取る","非表示でないグループを名前で検索する","セキュリティ グループと Microsoft 365 グループを作成する","他のゲスト ユーザーを招待する"],a:2,e:"メンバー ユーザーは既定でグループやアプリの登録を作成できますが、ゲスト ユーザーは自分のプロパティ読み取りや既存グループ의 検索などに権限が制限されています（他のゲストの招待は既定で可能です）。"},
 {id:116,imp:5,q:"「クラウド アプリケーション管理者」ロールと「アプリケーション管理者」ロールの主な違いは何ですか？",o:["クラウド アプリケーション管理者は、エンタープライズ アプリケーションを作成できない。","クラウド アプリケーション管理者は、アプリケーション プロキシを管理する権限を持たない。","クラウド アプリケーション管理者は、ユーザーのパスワードをリセットできる。","クラウド アプリケーション管理者は、テナント全体の管理者の同意を付与できる。"],a:1,e:"両者はほぼ同じ権限を持ちますが、「クラウド アプリケーション管理者」にはオンプレミス連携機能である「アプリケーション プロキシ」を管理する権限が含まれていません。"},
 {id:117,imp:1,q:"Microsoft Entra ID の「監査ログ」をフィルタリングして検索する際に、標準で利用できないフィルター項目はどれですか？",o:["サービス (Service)","カテゴリ (Category)","開始者/アクター (Initiator)","IP アドレスの場所 (IP Location)"],a:3,e:"監査ログのフィルターには、サービス、カテゴリ、アクティビティ、状態、ターゲット、開始者（アクター）、日付範囲が使用できます。IPの場所はサインインログ側の機能です。"},
 {id:118,imp:2,q:"Microsoft Entra ID で外部ユーザー（B2B ゲストなど）を管理する際、Premium 機能の課金モデルとして使用される基準は何ですか？",o:["テナント内のゲスト ユーザーの総数","月間アクティブ ユーザー (MAU)","1 日あたりのサインイン回数","テナント全体のライセンス数の 10%"],a:1,e:"外部ユーザー向けの価格モデルは、毎月アクティブに認証を利用したユーザー数に基づく「月間アクティブ ユーザー (MAU) 課金」を使用しており、毎月最初の 50,000 MAU は無料です。"},
 {id:119,imp:3,c:[0,1],q:"条件付きアクセスを使用して「使用条件 (Terms of Use)」の同意を要求する場合、ユーザーの有効期限切れ（再同意）を設定するためのオプションとして利用可能なものをすべて選択してください。",o:["再同意を要求するまでの日数を指定する","毎月、四半期ごとなど特定のスケジュールで有効期限の頻度を設定する","ユーザーのパスワードが変更されるたびに要求する","ユーザーのデバイスが準拠しなくなった場合に要求する"],e:"使用条件の再同意は、「同意してから何日後 (日数の指定)」または「毎月・特定の期限などのスケジュール指定」のいずれかで有効期限を設定できます。"},
 {id:120,imp:4,q:"エンタイトルメント管理の「アクセス パッケージ」にリソースとして SharePoint Online サイトを含める場合、既定でユーザーに付与できるロールの数は通常いくつですか？",o:["1 つ (メンバーのみ)","2 つ (メンバー、所有者)","3 つ","5 つ"],a:2,e:"グループやチームには「メンバー」と「所有者」の2つのロールがありますが、SharePoint サイトには通常 3 つのロール（閲覧者、メンバー、所有者）が用意されています。"},
 {id:121,imp:5,q:"「継続的アクセス評価 (CAE)」対応のクライアントが、リソース プロバイダー（Exchange Onlineなど）からアクセス拒否（トークン失効）を通知された場合、クライアントはどのような動作を行いますか？",o:["403 Forbidden チャレンジを受け取り、デバイスを自動的に再起動する。","401+ 要求チャレンジ (Claim challenge) を受け取り、キャッシュをバイパスして Microsoft Entra ID に更新トークンを送り返し、再評価を求める。","500 Internal Server Error を受け取り、オフライン モードに切り替わる。","302 Redirect を受け取り、手動での MFA 登録を強制する。"],a:1,e:"CAE では、リソース プロバイダーがアクセスを拒否すると「401+ 要求チャレンジ」を返します。これを受けたクライアントはキャッシュをバイパスし、Entra ID に対して直ちに再認証と条件の再評価を求めます。"},
 {id:122,imp:1,q:"ベストプラクティスとして、Privileged Identity Management (PIM) を使用した特権アクセスの戦略や構成の定期的な見直し（レビュー）は、最低でもどの程度の頻度で実行することが推奨されていますか？",o:["30 日ごと","90 日ごと","半年ごと","1 年ごと"],a:1,e:"特権アクセス戦略の見直しやレビューは、少なくとも 90 日ごと、または IT スタッフの職務変更や組織のサブスクリプション変更が発生した際に実行する必要があります。"},
 {id:123,imp:2,q:"アプリケーションの登録において、OAuth 2.0 の「リダイレクト URI (redirect_uri)」パラメーターの要件として正しいものはどれですか？",o:["テナント内のすべてのアプリケーションで一意である必要がある。","アプリケーション登録ポータルで登録したリダイレクト URI のいずれかと完全に一致させる必要がある。","常に HTTPS を使用する必要があり、ローカル ホスト (localhost) の指定は許可されない。","認証後、ユーザーを常にテナントのホーム ページにリダイレクトする。"],a:1,e:"認証要求で送信される redirect_uri パラメーターは、アプリの登録時に設定したリダイレクト URI のいずれかと完全に一致している必要があります。"},
 {id:124,imp:3,c:[0,1,2],q:"Global Secure Access の「トラフィック ログ」において、ネットワーク接続のコンポーネント（5 タプル）として含まれる要素をすべて選択してください。",o:["接続元の IP アドレス","接続先の IP アドレス","接続元と接続先のポート","ユーザーのパスワード ハッシュ","完全修飾ドメイン名 (FQDN)"],e:"接続のコンポーネント（5タプル）には、接続元のIPアドレス、接続先のIPアドレス、接続元のポート、接続先のポート、完全修飾ドメイン名 (FQDN) が含まります。"},
 {id:125,imp:4,q:"Global Secure Access のダッシュボードにある「Web カテゴリのフィルター処理」ウィジェットで、トラフィック結果を並べ替えるために使用される 3 つの指標はどれですか？",o:["トランザクション、ユーザー、デバイス","リスクスコア、コンプライアンス状態、アプリタグ","セッション、トークン、パケットサイズ","成功、失敗、ブロック"],a:0,e:"Web カテゴリのウィジェットでは、過去 24 時間にアクセスした「トランザクション数」「ユーザー (UPN) 数」「デバイス (ID) 数」を使用して結果が並べ替えられます。"},
 {id:126,imp:5,q:"条件付きアクセス ポリシーの「サインインの頻度」を 1 時間 (01:00) に設定しました。ユーザーが 00:00 にサインインして作業を開始し、00:30 にデバイスをロックして離席しました。その後、00:45 に戻ってデバイスのロックを解除した場合、このユーザーが次に再サインインを求められる時刻はいつですか？",o:["01:00","01:30","01:45","トークンが失効するまで求められない"],a:2,e:"00:45 にデバイスのロックを解除した時点でバックグラウンドでサインイン（再認証）が発生しているため、1 時間のタイマーはその時点からリセットされます。したがって、次にサインインが求められるのは 1 時間後の 01:45 となります。"},
];

function certById(id){ return CERTS.find(c=>c.id===id) || null; }

// 選択中の資格データを現在の変数へ読み込む
function loadCert(id){
  const c = certById(id); if(!c) return;
  S.cert = c.id;
  Q = c.Q || []; CONCEPTS = c.CONCEPTS || []; TIERS = c.TIERS || [];
  DRAW = c.draw || 45; PASS = c.pass || 700;
}
function selectCert(id){
  const c = certById(id); if(!c || c.status!=="ready") return;
  loadCert(id);
  applyCloud(id);          // ログイン中ならクラウドの該当データを取り込む
  S.screen = "home"; render();
}

// クラウド(cloudData)の該当資格データを、この端末のローカルへ反映
function applyCloud(certId){
  if(!cloudData) return;
  const d = cloudData[certId]; if(!d) return;
  try{
    if(d.bp !== undefined) localStorage.setItem("cert_"+certId+"_bp", String(d.bp));
    if(d.wrong !== undefined) localStorage.setItem("cert_"+certId+"_wrong", JSON.stringify([...new Set(d.wrong||[])]));
    if(d.history !== undefined) localStorage.setItem("cert_"+certId+"_history", JSON.stringify(d.history));
  }catch(e){}
}

// 新規アカウント時：この端末にあるローカルの各資格データをクラウドへ初期投入
function seedCloudFromLocal(){
  if(!db || !currentUserId || !window.FirebaseSync) return;
  const patch = {};
  CERTS.forEach(c=>{
    const bp = localStorage.getItem("cert_"+c.id+"_bp");
    const wrong = localStorage.getItem("cert_"+c.id+"_wrong");
    const hist = localStorage.getItem("cert_"+c.id+"_history");
    if(bp || wrong || hist){
      patch[c.id] = {
        bp: bp ? (parseInt(bp,10)||0) : 0,
        wrong: wrong ? (JSON.parse(wrong)||[]) : [],
        history: hist ? (JSON.parse(hist)||[]) : []
      };
    }
  });
  if(Object.keys(patch).length || loadCoins()){
    try{
      window.FirebaseSync.setDoc(window.FirebaseSync.doc(db,"users",currentUserId),
        { certs: patch, coins: loadCoins(), updatedAt:new Date().toISOString() }, { merge:true });
    }catch(e){}
  }
}

function migrateOldData(){
  const map = [["az900_bp","cert_az900_bp"],["az900_wrong","cert_az900_wrong"],["az900_history_v1","cert_az900_history"]];
  map.forEach(([o,n])=>{

  });

// 資格カード1枚分のステータス（ローカル保存から算出）
function certStat(c){
  const bp = parseInt(localStorage.getItem("cert_"+c.id+"_bp")||"0",10)||0;
  let hist=[]; try{ hist=JSON.parse(localStorage.getItem("cert_"+c.id+"_history")||"[]")||[]; }catch(e){}
  const best = hist.reduce((m,x)=>Math.max(m,x.score),0);
  const tiers = c.TIERS||[];
  const lvl = tiers.filter(t=>bp>=t.bp).length;
  return { bp, best, plays:hist.length, lvl, tiers:tiers.length };
}

/* ---- 総合エンジニアレベル（全資格の合計BPから連続的に算出）----
   資格レベルが TIERS の段数なのに対し、総合は「合計BPの数式」で出す。
   資格が増えても合計BPが増えて自然にレベルが上がるだけなので破綻しない。 */
const OVERALL_STEP = 300;
function totalBP(){ return CERTS.reduce((s,c)=>s + (parseInt(localStorage.getItem("cert_"+c.id+"_bp")||"0",10)||0), 0); }
function overallLevel(tbp){ return Math.floor((Math.sqrt(1 + 8*tbp/OVERALL_STEP) - 1) / 2); }
function bpForLevel(L){ return OVERALL_STEP * L * (L+1) / 2; }   // レベルLの開始に必要な合計BP
function overallTitle(lv){
  if(lv>=40) return "クラウドアーキテクト";
  if(lv>=30) return "シニアエンジニア";
  if(lv>=20) return "クラウドエンジニア";
  if(lv>=12) return "アソシエイト";
  if(lv>=6)  return "ジュニアエンジニア";
  if(lv>=1)  return "見習いエンジニア";
  return "ビギナー";
}
function overallStat(){
  const tbp = totalBP();
  const lv = overallLevel(tbp);
  const start = bpForLevel(lv), next = bpForLevel(lv+1);
  const pct = next>start ? Math.round((tbp-start)/(next-start)*100) : 100;
  const remain = Math.max(0, next - tbp);
  const active = CERTS.filter(c=>c.status==="ready" && (parseInt(localStorage.getItem("cert_"+c.id+"_bp")||"0",10)||0)>0).length;
  return { tbp, lv, pct, remain, active, title:overallTitle(lv) };
}

// 公開用の要約データ（個人の問題履歴などは含めない）
function buildPublic(){
  const certLevels={};
  CERTS.forEach(c=>{
    if(c.status==="ready"){
      const bp=parseInt(localStorage.getItem("cert_"+c.id+"_bp")||"0",10)||0;
      certLevels[c.id]=(c.TIERS||[]).filter(t=>bp>=t.bp).length;
    }
  });
  const ov=overallStat();
  return { displayName:getProfileName()||defaultName(), totalBP:ov.tbp, overallLevel:ov.lv,
           title:ov.title, certLevels, updatedAt:new Date().toISOString() };
}

    <div class="q-head"><button class="quit" data-go="select">← 資格選択</button><span class="q-count">プロフィール</span></div>
    <div class="me-hero">
      <div class="me-lab">総合エンジニアレベル</div>
      <div class="me-lvrow"><span class="me-lv">Lv.${ov.lv}</span><span class="me-title">${esc(ov.title)}</span></div>
      <div class="me-next" style="margin-top:6px">${ov.tbp.toLocaleString()} BP ・ 学習中 ${ov.active} 資格</div>
    </div>
    <div class="dc-sub">ユーザー名</div>
    <input id="pf-name" class="auth-input" maxlength="16" placeholder="例：くらうど太郎" value="${esc(name)}">
    <div id="pf-msg" class="auth-msg"></div>
    <button class="cta" id="pf-save">${guestMode?"※ ログインするとランキングに参加できます":"ユーザー名を保存"}</button>
    <div class="x-hint" style="margin-top:8px">ランキングはログイン中、クイズを解くたびに<b style="color:var(--good)">自動で更新</b>されます。ユーザー名は空にできず、他の人と重複しない名前にしてください。</div>
    <div class="dc-sub">資格別レベル</div>
    <div class="pf-list">${certRows}</div>
    <button class="ghost" data-go="ranking" style="margin-top:14px">🏆 ランキングを見る</button>
    ${(!guestMode && currentUser) ? `
    <div class="danger-zone">
      <div class="dz-title">アカウント削除</div>
      <div class="dz-note">退会するとアカウント情報・スコア・履歴がすべて削除され、元に戻せません。</div>
      <button class="ghost danger" id="pf-del">アカウントを削除する（退会）</button>
    </div>` : ""}
  `;
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
  const pd=document.getElementById("pf-del"); if(pd)pd.onclick=openDeleteModal;
  const msg=document.getElementById("pf-msg");
  document.getElementById("pf-save").onclick=async ()=>{
    if(guestMode || !currentUser){ msg.style.color="var(--gold)"; msg.textContent="ランキングに参加するにはログインが必要です。"; return; }
    const v=(document.getElementById("pf-name").value||"").trim();
    if(!v){ msg.style.color="var(--gold)"; msg.textContent="ユーザー名を入力してください（空にはできません）。"; return; }
    if(v===getProfileName()){ msg.style.color="var(--muted)"; msg.textContent="現在のユーザー名と同じです。"; return; }
    if(!window.LB){ msg.style.color="var(--bad)"; msg.textContent="準備中です。少し待って再度お試しください。"; return; }
    msg.style.color="var(--muted)"; msg.textContent="重複を確認中…";
    try{
      const taken=await window.LB.nameTaken(v);
      if(taken){ msg.style.color="var(--bad)"; msg.textContent="その名前はすでに使われています。別の名前にしてください。"; return; }
      setProfileName(v);
      publishLeaderboard();
      msg.style.color="var(--good)"; msg.textContent="✓ ユーザー名を保存し、ランキングに反映しました。";
    }catch(e){
      msg.style.color="var(--bad)"; msg.textContent="確認に失敗しました。通信環境を確認してください。";
    }
  };
  window.scrollTo(0,0);
}

function renderRanking(){

    <div class="q-head"><button class="quit" data-go="select">← 資格選択</button><span class="q-count">ランキング</span></div>
    <div id="lb-body"><div class="loading">読み込み中…</div></div>
  `;
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
  loadRanking();
  window.scrollTo(0,0);
}
async function loadRanking(){
  const body=document.getElementById("lb-body"); if(!body) return;
  if(guestMode || !window.LB || !currentUser){
    body.innerHTML=`<div class="empty">ランキングを見るにはログインが必要です。<br>ログインして、プロフィールで表示名を設定すると参加できます。</div>`;
    return;
  }
  try{
    const rows = await window.LB.top(50);
    const ov = overallStat();
    let myRank=null; try{ myRank = await window.LB.myRank(ov.tbp); }catch(e){}
    if(!rows.length){
      body.innerHTML=`<div class="empty">まだ誰もランキングに登録していません。<br>プロフィールで表示名を設定すると一番乗りで参加できます。</div>`;
      return;
    }
    const myUid=currentUserId;
    const mine = rows.find(r=>r.uid===myUid);
    body.innerHTML = `
      ${(myRank && !mine || myRank)?`<div class="lb-me">あなた：${myRank?("<b>"+myRank+"位</b>"):"未公開"} ・ 総合Lv.${ov.lv} ・ ${ov.tbp.toLocaleString()} BP${getProfileName()?"":' <button class="link2" data-go="profile">表示名を変更</button>'}</div>`:""}
      <div class="lb-list">
        ${rows.map((r,i)=>`
          <div class="lb-row ${r.uid===myUid?'me':''}">
            <span class="lb-rank ${i<3?'top':''}">${i+1}</span>
            <div class="lb-info">
              <span class="lb-name">${esc(r.displayName||"名無し")}${r.uid===myUid?' <small>(あなた)</small>':''}</span>
              <span class="lb-cert">総合Lv.${r.overallLevel||0}${r.title?" ・ "+esc(r.title):""}</span>
            </div>
            <span class="lb-bp">${(r.totalBP||0).toLocaleString()}<small> BP</small></span>
          </div>`).join("")}
      </div>
      <div class="x-hint" style="margin-top:14px">${getProfileName()?"":'表示名は未設定でも自動で参加中です。<button class="link2" data-go="profile">表示名を変更</button>'}</div>
    `;
    app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));
  }catch(e){
    body.innerHTML=`<div class="empty">読み込みに失敗しました。<br>${esc(String(e.message||e))}</div>`;
  }
}

migrateOldData();
S.coins = loadCoins();
render();

// 安全装置：8秒待ってもFirebaseの準備が終わらない（通信が遅い/失敗）場合は
// 固まらないようログイン画面へ進める。ゲスト利用への導線もそこにあります。
setTimeout(function(){
  if(!authReady && !guestMode){ authReady = true; render(); }
}, 8000);
</script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, query, where, orderBy, limit, getDocs, getCountFromServer, writeBatch, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, deleteUser, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCg3zD2xkq_3e5MclG9YK_uVqVzWulO9Ws",
    authDomain: "my-az900-app.firebaseapp.com",
    projectId: "my-az900-app",
    storageBucket: "my-az900-app.firebasestorage.app",
    messagingSenderId: "989248012630",
    appId: "1:989248012630:web:1801a2033c56887320d6f7",
    measurementId: "G-4E16HLF386"
  };

  window.FirebaseSync = { doc, setDoc };
  try {
    const fbApp = initializeApp(firebaseConfig);
    db = getFirestore(fbApp);
    const auth = getAuth(fbApp);

    // 画面側（通常スクリプト）から呼び出せる認証API
    window.Auth = {
      signup: (email, pw) => createUserWithEmailAndPassword(auth, email, pw),
      login:  (email, pw) => signInWithEmailAndPassword(auth, email, pw),
      logout: () => signOut(auth)
    };

    // 画面側から呼び出せるランキングAPI（公開コレクション leaderboard）
    window.LB = {
      publish: async (data) => {
        if (!currentUserId) return;
        await setDoc(doc(db, "leaderboard", currentUserId), data, { merge: true });
      },
      top: async (n) => {
        const q = query(collection(db, "leaderboard"), orderBy("totalBP", "desc"), limit(n || 50));
        const snap = await getDocs(q);
        const rows = []; snap.forEach(d => rows.push(Object.assign({ uid: d.id }, d.data())));
        return rows;
      },
      myRank: async (myBP) => {
        try {
          const c = await getCountFromServer(query(collection(db, "leaderboard"), where("totalBP", ">", myBP)));
          return c.data().count + 1;
        } catch (e) { return null; }
      },
      me: async () => {
        if (!currentUserId) return null;
        try { const d = await getDoc(doc(db, "leaderboard", currentUserId)); return d.exists() ? d.data() : null; }
        catch (e) { return null; }
      },
      // 表示名が既に他ユーザーに使われているか（自分自身は除外）
      nameTaken: async (name) => {
        const snap = await getDocs(query(collection(db, "leaderboard"), where("displayName", "==", name)));
        let taken = false;
        snap.forEach(d => { if (d.id !== currentUserId) taken = true; });
        return taken;
      }
    };

    // 問題ごとの正答率を集計する公開API（qstats/{certId}_{qid} に増分で蓄積）
    window.QStats = {
      // results: [{qid, correct:true/false}, ...] を一括加算
      record: async (certId, results) => {
        if (!db || !currentUserId || !Array.isArray(results) || !results.length) return;
        try {
          const batch = writeBatch(db);
          results.forEach(r => {
            const ref = doc(db, "qstats", certId + "_" + r.qid);
            batch.set(ref, {
              cert: certId, qid: r.qid,
              attempts: increment(1),
              correct: increment(r.correct ? 1 : 0)
            }, { merge: true });
          });
          await batch.commit();
        } catch (e) { console.error("qstats record failed:", e); }
      },
      // 1問の集計を取得 → {attempts, correct} | null
      get: async (certId, qid) => {
        try { const d = await getDoc(doc(db, "qstats", certId + "_" + qid)); return d.exists() ? d.data() : null; }
        catch (e) { return null; }
      },
      // 複数問をまとめて取得 → { qid: {attempts, correct}, ... }
      getMany: async (certId, qids) => {
        const out = {};
        await Promise.all((qids || []).map(async id => {
          try { const d = await getDoc(doc(db, "qstats", certId + "_" + id)); if (d.exists()) out[id] = d.data(); }
          catch (e) {}
        }));
        return out;
      }
    };

    // アカウント削除（退会）API
    window.Account = {
      // password で再認証 → 個人データ削除 → 認証アカウント削除（qstats集計は保持）
      delete: async (password) => {
        const user = auth.currentUser;
        if (!user) { const e = new Error("no-user"); e.code = "no-user"; throw e; }
        // 1) 再認証（パスワード検証＋recent-login確保）。失敗時はここで中断し、何も削除されない
        await reauthenticateWithCredential(user, EmailAuthProvider.credential(user.email, password));
        // 2) 個人データ・公開要約を削除（集計 qstats は触らない＝他ユーザーの正答率は不変）
        try { await deleteDoc(doc(db, "leaderboard", user.uid)); } catch (e) { console.error("del leaderboard:", e); }
        try { await deleteDoc(doc(db, "users", user.uid)); } catch (e) { console.error("del user doc:", e); }
        // 3) 認証アカウント本体を削除（これでセッションも破棄され onAuthStateChanged(null) が発火）
        await deleteUser(user);
      }
    };

    let unsub = null;
    let lbAutoDone = false;   // ログインごとに1回、最新の成績をランキングへ自動反映

    // ログイン状態の監視。ログイン中はそのアカウントのデータをリアルタイム同期
    onAuthStateChanged(auth, (user) => {
      authReady = true;
      if (user) {
        currentUser = user;
        currentUserId = user.uid;
        profileChecked = false;   // このアカウントのユーザー名を確認するまでゲート
        // 公開プロフィール（表示名）をこの端末へ取り込む（機種をまたいで名前が引き継がれる）
        if (window.LB) {
          window.LB.me().then(d => {
            if (d && d.displayName) localStorage.setItem("profile_name", d.displayName);
          }).catch(() => {}).finally(() => { profileChecked = true; render(); });
        } else {
          profileChecked = true;
        }
        if (unsub) { unsub(); unsub = null; }
        lbAutoDone = false;
        unsub = onSnapshot(doc(db, "users", currentUserId), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            // アカウント共通のコイン残高をこの端末へ反映
            if (typeof data.coins === "number") { S.coins = data.coins; saveCoins(data.coins); }
            // 旧形式（資格未対応の {bp,wrong,history}）→ certs.az900 へ一度だけ移行
            if (!data.certs && data.bp !== undefined) {
              setDoc(doc(db, "users", currentUserId), {
                certs: { az900: { bp: data.bp, wrong: data.wrong || [], history: data.history || [] } }
              }, { merge: true });
              return; // 次のsnapshotで certs 形式として処理されます
            }
            if (data.certs) {
              cloudData = data.certs;            // クラウドの全資格データを保持
              if (S.cert) applyCloud(S.cert);    // 選択中の資格をこの端末へ反映
              if (S.screen==="home" || S.screen==="dc" || S.screen==="history" || S.screen==="select") { render(); }
              if (!lbAutoDone) { lbAutoDone = true; try{ publishLeaderboard(); }catch(e){} }  // ログイン時に自動でランキング反映
            } else {
              seedCloudFromLocal();              // 中身が空 → ローカルから初期投入
            }
          } else {
            seedCloudFromLocal();                // ドキュメント未作成 → ローカルから初期投入
          }
        });
      } else {
        currentUser = null;
        currentUserId = null;
        if (unsub) { unsub(); unsub = null; }
      }
      render();
    });
  } catch (e) {
    console.error("Firebase init failed:", e);
    // 初期化に失敗しても画面が固まらないようにゲートを解除
    authReady = true;
    render();
  }
</script>
